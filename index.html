<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SquadApp - Défis entre Potes</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icônes FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React, Babel & Supabase CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #fef08a 0%, #fbcfe8 100%);
            min-height: 100vh;
        }
        h1, h2, .brand-font {
            font-family: 'Comfortaa', display;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 flex justify-center items-start md:items-center py-0 md:py-8">

    <div id="root" class="w-full max-w-md bg-white min-h-screen md:min-h-[850px] md:max-h-[850px] md:rounded-3xl md:shadow-2xl overflow-hidden flex flex-col border border-pink-100 relative"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- CONFIGURATION SUPABASE ---
        // Tu peux modifier ces valeurs directement ici OU les configurer directement dans l'application sur ton écran !
        const DEFAULT_SUPABASE_URL = ""; 
        const DEFAULT_SUPABASE_KEY = "";

        // --- FONCTION DE COMPRESSION D'IMAGE (Pour éviter de saturer la base de données) ---
        const compressImage = (base64Str, maxSize = 1080) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxSize) {
                            height *= maxSize / width;
                            width = maxSize;
                        }
                    } else {
                        if (height > maxSize) {
                            width *= maxSize / height;
                            height = maxSize;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                };
            });
        };

        function App() {
            // Configuration Supabase dynamique
            const [sbUrl, setSbUrl] = useState(() => localStorage.getItem('squad_sb_url') || DEFAULT_SUPABASE_URL);
            const [sbKey, setSbKey] = useState(() => localStorage.getItem('squad_sb_key') || DEFAULT_SUPABASE_KEY);
            const [supabaseClient, setSupabaseClient] = useState(null);

            // Données de l'appli
            const [groups, setGroups] = useState([]);
            const [members, setMembers] = useState([]);
            const [challenges, setChallenges] = useState([]);
            const [submissions, setSubmissions] = useState([]);
            
            const [currentUser, setCurrentUser] = useState(() => JSON.parse(localStorage.getItem('squad_current_user')) || null);
            const [currentGroup, setCurrentGroup] = useState(() => localStorage.getItem('squad_active_group_id') || "");
            
            // UI
            const [activeTab, setActiveTab] = useState("feed");
            const [showJoinModal, setShowJoinModal] = useState(false);
            const [showAddChallengeModal, setShowAddChallengeModal] = useState(false);
            const [showCreateGroupModal, setShowCreateGroupModal] = useState(false);
            const [showDbSetup, setShowDbSetup] = useState(false);
            const [isLoading, setIsLoading] = useState(false);

            // Formulaires
            const [joinName, setJoinName] = useState("");
            const [joinPassword, setJoinPassword] = useState("");
            const [newGroupName, setNewGroupName] = useState("");
            const [newGroupPass, setNewGroupPass] = useState("");
            const [regUserName, setRegUserName] = useState("");
            const [regCity, setRegCity] = useState("");
            const [regTimezone, setRegTimezone] = useState(Intl.DateTimeFormat().resolvedOptions().timeZone);
            const [newChallengeTitle, setNewChallengeTitle] = useState("");
            const [newChallengeDesc, setNewChallengeDesc] = useState("");
            const [profilePhotoUrl, setProfilePhotoUrl] = useState("");
            const [editName, setEditName] = useState("");
            const [editCity, setEditCity] = useState("");
            const [editTimezone, setEditTimezone] = useState(Intl.DateTimeFormat().resolvedOptions().timeZone);
            const [editAvatarFile, setEditAvatarFile] = useState(null);
            const [showEditProfileModal, setShowEditProfileModal] = useState(false);
            const [expandedChallengeId, setExpandedChallengeId] = useState(null);

            const [timeTick, setTimeTick] = useState(new Date());

            useEffect(() => {
                if (currentUser) {
                    setEditName(currentUser.name || "");
                    setEditCity(currentUser.city || "");
                    setEditTimezone(currentUser.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone);
                    setProfilePhotoUrl(currentUser.avatar_url || currentUser.photo_url || "");
                }
            }, [currentUser]);

            // Initialiser le client Supabase
            useEffect(() => {
                if (sbUrl && sbKey) {
                    try {
                        const client = supabase.createClient(sbUrl, sbKey);
                        setSupabaseClient(client);
                    } catch (e) {
                        console.error("Erreur de connexion Supabase:", e);
                    }
                }
            }, [sbUrl, sbKey]);

            // Horloge temps réel
            useEffect(() => {
                const timer = setInterval(() => setTimeTick(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const getLocalTime = (tz) => {
                try {
                    return timeTick.toLocaleTimeString('fr-FR', {
                        timeZone: tz,
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                } catch(e) {
                    return timeTick.toLocaleTimeString('fr-FR');
                }
            };

            const getChallengeExpiry = (challenge) => {
                if (challenge.expires_at) {
                    return new Date(challenge.expires_at);
                }
                const createdAt = challenge.created_at ? new Date(challenge.created_at) : new Date();
                const expiry = new Date(createdAt);
                expiry.setDate(expiry.getDate() + 7);
                return expiry;
            };

            const getChallengeRemaining = (challenge) => {
                const diff = getChallengeExpiry(challenge) - new Date();
                if (diff <= 0) return "Expiré";
                const days = Math.floor(diff / 86400000);
                const hours = Math.floor((diff % 86400000) / 3600000);
                const minutes = Math.floor((diff % 3600000) / 60000);
                return `${days}j ${hours}h ${minutes}m`;
            };

            const isChallengeExpired = (challenge) => {
                const expiry = getChallengeExpiry(challenge);
                return expiry.getTime() <= Date.now();
            };

            const getChallengeRealityStatus = (challenge) => {
                if (isChallengeExpired(challenge)) return 'expired';
                return challenge.status || 'active';
            };

            // --- CHARGER TOUTES LES DONNÉES DEPUIS SUPABASE ---
            const loadData = useCallback(async () => {
                if (!supabaseClient) return;
                setIsLoading(true);
                try {
                    // 1. Charger les groupes
                    const { data: grps } = await supabaseClient.from('groups').select('*');
                    setGroups(grps || []);

                    if (grps && grps.length > 0) {
                        const activeId = currentGroup || grps[0].id;
                        if (!currentGroup) {
                            setCurrentGroup(activeId);
                            localStorage.setItem('squad_active_group_id', activeId);
                        }

                        // 2. Charger membres du groupe actif
                        const { data: mems } = await supabaseClient
                            .from('group_members')
                            .select('points, profiles(id, name, city, timezone)')
                            .eq('group_id', activeId);

                        const formattedMems = (mems || []).map(m => ({
                            id: m.profiles.id,
                            name: m.profiles.name,
                            city: m.profiles.city,
                            timezone: m.profiles.timezone,
                            points: m.points
                        }));
                        setMembers(formattedMems);

                        // 3. Charger défis du groupe actif
                        const { data: challs } = await supabaseClient
                            .from('challenges')
                            .select('*')
                            .eq('group_id', activeId)
                            .order('created_at', { ascending: false });
                        setChallenges(challs || []);

                        // 4. Charger soumissions
                        const { data: subs } = await supabaseClient
                            .from('submissions')
                            .select('*')
                            .eq('group_id', activeId)
                            .order('created_at', { ascending: false });
                        setSubmissions(subs || []);
                    }
                } catch (error) {
                    console.error("Erreur de chargement :", error);
                } finally {
                    setIsLoading(false);
                }
            }, [supabaseClient, currentGroup]);

            useEffect(() => {
                if (supabaseClient) {
                    loadData();
                }
            }, [supabaseClient, currentGroup, loadData]);

            // Sauvegarder l'ID de groupe actif en local
            const handleGroupChange = (groupId) => {
                setCurrentGroup(groupId);
                localStorage.setItem('squad_active_group_id', groupId);
            };

            // --- INSCRIPTION UTILISATEUR ---
            const handleRegister = async (e) => {
                e.preventDefault();
                if (!regUserName || !regCity || !supabaseClient) return;

                const userId = 'usr_' + Date.now();
                const newUser = {
                    id: userId,
                    name: regUserName,
                    city: regCity,
                    timezone: regTimezone,
                    avatar_url: profilePhotoUrl || null
                };

                setIsLoading(true);
                try {
                    // Insérer dans profils Supabase
                    await supabaseClient.from('profiles').insert([newUser]);
                    setCurrentUser(newUser);
                    localStorage.setItem('squad_current_user', JSON.stringify(newUser));

                    // L'associer au groupe actif s'il y en a un
                    if (currentGroup) {
                        await supabaseClient.from('group_members').insert([{
                            group_id: currentGroup,
                            profile_id: userId,
                            points: 0
                        }]);
                        loadData();
                    }
                } catch (error) {
                    alert("Erreur lors de l'inscription : " + error.message);
                } finally {
                    setIsLoading(false);
                }
            };

            // --- REJOINDRE UN GROUPE ---
            const handleJoinGroup = async (e) => {
                e.preventDefault();
                if (!supabaseClient) return;

                setIsLoading(true);
                try {
                    const { data, error } = await supabaseClient
                        .from('groups')
                        .select('*')
                        .eq('id', joinName.toLowerCase().trim())
                        .single();

                    if (data && data.password === joinPassword) {
                        setCurrentGroup(data.id);
                        localStorage.setItem('squad_active_group_id', data.id);
                        setShowJoinModal(false);

                        // Ajouter l'utilisateur aux membres du groupe
                        if (currentUser) {
                            await supabaseClient.from('group_members').upsert([{
                                group_id: data.id,
                                profile_id: currentUser.id,
                                points: 0
                            }]);
                        }
                        await loadData();
                        alert(`Bienvenue dans le groupe : ${data.name} !`);
                    } else {
                        alert("Groupe introuvable ou mot de passe incorrect.");
                    }
                } catch (err) {
                    alert("Erreur de connexion : " + err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            // --- CRÉER UN GROUPE ---
            const handleCreateGroup = async (e) => {
                e.preventDefault();
                if (!newGroupName || !newGroupPass || !supabaseClient) return;

                const newId = newGroupName.toLowerCase().replace(/\s+/g, '-');
                setIsLoading(true);
                try {
                    // Créer le groupe
                    await supabaseClient.from('groups').insert([{
                        id: newId,
                        name: newGroupName,
                        password: newGroupPass
                    }]);

                    // Associer le créateur
                    if (currentUser) {
                        await supabaseClient.from('group_members').insert([{
                            group_id: newId,
                            profile_id: currentUser.id,
                            points: 0
                        }]);
                    }

                    // Créer un premier défi par défaut
                    await supabaseClient.from('challenges').insert([{
                        id: 'c_' + Date.now(),
                        group_id: newId,
                        title: "Prendre un café en terrasse ☕",
                        description: "Partage ton meilleur spot !",
                        status: "active",
                        expires_at: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString()
                    }]);

                    setCurrentGroup(newId);
                    localStorage.setItem('squad_active_group_id', newId);
                    setShowCreateGroupModal(false);
                    await loadData();
                    alert(`Groupe "${newGroupName}" créé !`);
                } catch (err) {
                    alert("Erreur lors de la création : " + err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            // --- PROPOSER UN DÉFI ---
            const handleAddChallenge = async (e) => {
                e.preventDefault();
                if (!newChallengeTitle || !supabaseClient) return;

                setIsLoading(true);
                try {
                    // Passer l'ancien défi en statut "past"
                    if (challenges.length > 0) {
                        const activeId = challenges.find(c => getChallengeRealityStatus(c) === "active")?.id;
                        if (activeId) {
                            await supabaseClient
                                .from('challenges')
                                .update({ status: 'past' })
                                .eq('id', activeId);
                        }
                    }

                    // Insérer le nouveau défi
                    await supabaseClient.from('challenges').insert([{
                        id: 'c_' + Date.now(),
                        group_id: currentGroup,
                        title: newChallengeTitle,
                        description: newChallengeDesc,
                        status: "active",
                        expires_at: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString()
                    }]);

                    setShowAddChallengeModal(false);
                    setNewChallengeTitle("");
                    setNewChallengeDesc("");
                    await loadData();
                } catch (err) {
                    alert("Erreur d'ajout du défi : " + err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            // --- SOUMETTRE LE DÉFI AVEC PHOTO COMPRESSÉE ---
            const handlePhotoUpload = (e) => {
                const file = e.target.files[0];
                if (!file || !currentUser || !supabaseClient) return;

                const activeChallenge = challenges.find(c => getChallengeRealityStatus(c) === "active");
                if (!activeChallenge) {
                    alert("Aucun défi actif ou le défi est expiré.");
                    return;
                }

                if (isChallengeExpired(activeChallenge)) {
                    alert("Le défi a expiré. Propose un nouveau défi pour continuer !");
                    return;
                }

                setIsLoading(true);
                const reader = new FileReader();
                reader.onloadend = async () => {
                    try {
                        const compressedB64 = await compressImage(reader.result, 1080);

                        const newSub = {
                            id: 'sub_' + Date.now(),
                            group_id: currentGroup,
                            challenge_id: activeChallenge.id,
                            user_id: currentUser.id,
                            user_name: currentUser.name,
                            user_city: currentUser.city,
                            user_timezone: currentUser.timezone,
                            photo: compressedB64,
                            likes: 0,
                            liked_by: []
                        };

                        const { error } = await supabaseClient.from('submissions').insert([newSub]);
                        if (error) throw error;

                        const memberInfo = members.find(m => m.id === currentUser.id);
                        const currentPoints = memberInfo ? memberInfo.points : 0;

                        await supabaseClient
                            .from('group_members')
                            .update({ points: currentPoints + 100 })
                            .eq('group_id', currentGroup)
                            .eq('profile_id', currentUser.id);

                        alert("Défi relevé ! +100 points ! 🎉");
                        await loadData();
                    } catch (err) {
                        alert("Erreur d'envoi : " + err.message);
                    } finally {
                        setIsLoading(false);
                    }
                };
                reader.readAsDataURL(file);
            };

            // --- CONFIGURER SUPABASE DEPUIS L'ÉCRAN ---
            const handleSetupDb = (e) => {
                e.preventDefault();
                localStorage.setItem('squad_sb_url', sbUrl);
                localStorage.setItem('squad_sb_key', sbKey);
                setShowDbSetup(false);
                window.location.reload(); // Recharger pour initier la connexion
            };

            const handleEditProfile = async (e) => {
                e.preventDefault();
                if (!currentUser || !supabaseClient) return;

                setIsLoading(true);
                try {
                    let avatarUrl = profilePhotoUrl;
                    if (editAvatarFile) {
                        const reader = new FileReader();
                        const blobResult = await new Promise((resolve, reject) => {
                            reader.onloadend = () => resolve(reader.result);
                            reader.onerror = reject;
                            reader.readAsDataURL(editAvatarFile);
                        });
                        avatarUrl = await compressImage(blobResult, 1080);
                    }

                    const updatedUser = {
                        name: editName,
                        city: editCity,
                        timezone: editTimezone,
                        avatar_url: avatarUrl
                    };

                    const { error } = await supabaseClient
                        .from('profiles')
                        .update(updatedUser)
                        .eq('id', currentUser.id);

                    if (error) throw error;

                    const mergedUser = { ...currentUser, ...updatedUser };
                    setCurrentUser(mergedUser);
                    localStorage.setItem('squad_current_user', JSON.stringify(mergedUser));
                    setProfilePhotoUrl(avatarUrl || "");
                    setShowEditProfileModal(false);
                    await loadData();
                } catch (err) {
                    alert("Erreur lors de la mise à jour du profil : " + err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            // --- METTRE UN SUPER-LIKE ---
            const handleSuperLike = async (subId) => {
                if (!currentUser || !supabaseClient) return;

                const submission = submissions.find(s => s.id === subId);
                const activeChallenge = challenges.find(c => getChallengeRealityStatus(c) === "active");

                if (!submission) return;

                if (submission.user_id === currentUser.id) {
                    alert("Tu ne peux pas t'attribuer ton propre Super Like ! 😉");
                    return;
                }

                const alreadyLiked = submission.liked_by && submission.liked_by.includes(currentUser.id);
                if (alreadyLiked) {
                    alert("Tu as déjà mis un Super Like sur cette proposition.");
                    return;
                }

                if (!activeChallenge || activeChallenge.id !== submission.challenge_id) {
                    alert("Ce défi n'est plus actif ou la publication est ancienne.");
                    return;
                }

                setIsLoading(true);
                try {
                    const currentLikedBy = submission.liked_by || [];
                    const updatedLikedBy = [...currentLikedBy, currentUser.id];
                    const updatedLikesCount = (submission.likes || 0) + 1;

                    await supabaseClient
                        .from('submissions')
                        .update({ likes: updatedLikesCount, liked_by: updatedLikedBy })
                        .eq('id', subId);

                    const creatorMember = members.find(m => m.id === submission.user_id);
                    const creatorPoints = creatorMember ? creatorMember.points : 0;

                    await supabaseClient
                        .from('group_members')
                        .update({ points: creatorPoints + 25 })
                        .eq('group_id', currentGroup)
                        .eq('profile_id', submission.user_id);

                    alert("Super Like envoyé ! Ton pote gagne +25 points ! 🚀");
                    await loadData();
                } catch (err) {
                    alert("Erreur de Super Like : " + err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const activeGroupObj = groups.find(g => g.id === currentGroup) || { name: "SquadApp" };
            const activeChallenge = challenges.find(c => getChallengeRealityStatus(c) === "active");

            // --- ÉCRAN 1 : CONFIGURATION BASE DE DONNÉES SI ABSENTE ---
            if (!sbUrl || !sbKey || showDbSetup) {
                return (
                    <div class="p-6 flex flex-col justify-center items-center min-h-[600px] flex-grow bg-white">
                        <div class="text-center mb-6">
                            <span class="text-5xl">⚡</span>
                            <h1 class="text-2xl font-bold text-gray-800 mt-2">Connecte ta base de données</h1>
                            <p class="text-sm text-gray-500 mt-2">Colle ici tes identifiants Supabase gratuits pour que tes amis puissent jouer avec toi en temps réel.</p>
                        </div>

                        <form onSubmit={handleSetupDb} class="w-full space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Project URL</label>
                                <input 
                                    type="text" 
                                    value={sbUrl} 
                                    onChange={e => setSbUrl(e.target.value)} 
                                    placeholder="https://xxxxxx.supabase.co" 
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-pink-300 outline-none"
                                    required 
                                />
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">API Key (Anon Public Key)</label>
                                <input 
                                    type="password" 
                                    value={sbKey} 
                                    onChange={e => setSbKey(e.target.value)} 
                                    placeholder="eyJhbGciOi..." 
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-pink-300 outline-none"
                                    required 
                                />
                            </div>

                            <button type="submit" class="w-full py-3 bg-gradient-to-r from-pink-500 to-yellow-500 text-white rounded-xl font-bold shadow-lg">
                                Connecter ma Base de Données 🔌
                            </button>
                        </form>
                    </div>
                );
            }

            // --- ÉCRAN 2 : INSCRIPTION DE L'UTILISATEUR ---
            if (!currentUser) {
                return (
                    <div class="p-6 flex flex-col justify-center items-center min-h-[500px] flex-grow bg-white">
                        <div class="text-center mb-8">
                            <span class="text-5xl">🔥</span>
                            <h1 class="text-3xl font-bold text-gray-800 mt-2">SquadApp</h1>
                            <p class="text-sm text-gray-500 mt-1">Sors de ta zone de confort avec tes potes</p>
                        </div>

                        <form onSubmit={handleRegister} class="w-full space-y-4">
                            <h2 class="text-lg font-bold text-gray-700">Crée ton profil</h2>
                            
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Ton Prénom</label>
                                <input 
                                    type="text" 
                                    value={regUserName} 
                                    onChange={e => setRegUserName(e.target.value)} 
                                    placeholder="Ex: Alexandre" 
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-300 transition"
                                    required 
                                />
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Ta Ville Actuelle</label>
                                <input 
                                    type="text" 
                                    value={regCity} 
                                    onChange={e => setRegCity(e.target.value)} 
                                    placeholder="Ex: Tokyo, Paris, Montréal" 
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-300 transition"
                                    required 
                                />
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Fuseau horaire</label>
                                <input 
                                    type="text" 
                                    value={regTimezone} 
                                    disabled 
                                    class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 text-gray-500 cursor-not-allowed text-sm" 
                                />
                            </div>

                            <button type="submit" disabled={isLoading} class="w-full py-3 bg-gradient-to-r from-pink-500 to-yellow-500 text-white rounded-xl font-bold shadow-lg disabled:opacity-50">
                                {isLoading ? "Création..." : "Commencer l'aventure 🚀"}
                            </button>
                        </form>
                    </div>
                );
            }

            // --- ÉCRAN CENTRAL PRINCIPAL ---
            return (
                <div class="flex flex-col h-full flex-grow bg-slate-50 relative">
                    
                    {/* INDICATEUR DE CHARGEMENT */}
                    {isLoading && (
                        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-pink-500 to-yellow-400 animate-pulse z-50"></div>
                    )}

                    {/* --- HEADER --- */}
                    <header class="bg-white px-4 py-3 shadow-sm border-b border-gray-100 flex items-center justify-between sticky top-0 z-10">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-full overflow-hidden bg-gradient-to-tr from-pink-500 to-yellow-400 flex items-center justify-center text-white font-bold brand-font shadow">
                                {profilePhotoUrl ? (
                                    <img src={profilePhotoUrl} alt="Avatar" class="w-full h-full object-cover" />
                                ) : (
                                    currentUser?.name?.substring(0, 2).toUpperCase() || 'SQ'
                                )}
                            </div>
                            <div>
                                <h1 class="text-lg font-bold text-gray-800 leading-none">{currentUser.name}</h1>
                                <span class="text-[10px] text-gray-400">Heure Locale : {getLocalTime(currentUser.timezone)}</span>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button 
                                onClick={() => setShowEditProfileModal(true)}
                                class="text-[11px] bg-pink-50 text-pink-600 px-3 py-2 rounded-2xl font-bold hover:bg-pink-100 transition"
                            >
                                Modifier mon profil
                            </button>

                            {/* Sélecteur de Groupe */}
                            <div class="flex items-center space-x-1">
                            <select 
                                value={currentGroup} 
                                onChange={e => handleGroupChange(e.target.value)} 
                                class="bg-gray-100 text-gray-800 text-xs font-bold rounded-lg px-2.5 py-1.5 focus:outline-none border-none cursor-pointer hover:bg-gray-200 transition"
                            >
                                {groups.length === 0 ? <option>Pas de groupe</option> : groups.map(g => (
                                    <option key={g.id} value={g.id}>{g.name}</option>
                                ))}
                            </select>
                            <button 
                                onClick={() => setShowJoinModal(true)} 
                                title="Rejoindre un groupe" 
                                class="w-8 h-8 rounded-lg bg-pink-50 text-pink-500 hover:bg-pink-100 flex items-center justify-center text-sm transition"
                            >
                                <i class="fa-solid fa-plus-minus"></i>
                            </button>
                        </div>
                    </div>
                    </header>

                    {/* --- HORLOGES MONDIALES DES MEMBRES ACTIFS EN TEMPS RÉEL --- */}
                    <div class="bg-gradient-to-r from-slate-900 to-slate-800 text-white px-3 py-2 text-xs flex space-x-3 overflow-x-auto no-scrollbar shadow-inner">
                        {members.length === 0 ? (
                            <div class="text-[11px] text-slate-400">Aucun autre membre connecté. Invite tes amis !</div>
                        ) : members.map(m => (
                            <div key={m.id} class="flex items-center space-x-1.5 bg-slate-700 bg-opacity-50 px-2 py-1 rounded-full whitespace-nowrap">
                                <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
                                <span class="font-medium">{m.name}</span>
                                <span class="text-slate-300">({m.city})</span>
                                <span class="font-bold text-yellow-300">{getLocalTime(m.timezone).substring(0, 5)}</span>
                            </div>
                        ))}
                    </div>

                    {/* --- CONTENU --- */}
                    <main class="flex-grow p-4 overflow-y-auto max-h-[640px] no-scrollbar pb-24">
                        
                        {/* REFRESH MANUEL */}
                        <div class="flex justify-end mb-2">
                            <button onClick={loadData} class="text-xs text-gray-400 hover:text-gray-600 flex items-center space-x-1">
                                <i class="fa-solid fa-arrows-rotate"></i>
                                <span>Actualiser</span>
                            </button>
                        </div>

                        {/* --- TAB FEED --- */}
                        {activeTab === "feed" && (
                            <div class="space-y-4">
                                <div className={`${activeChallenge && !isChallengeExpired(activeChallenge) ? 'bg-gradient-to-tr from-pink-500 via-purple-500 to-indigo-600 text-white' : 'bg-slate-100 text-slate-700'} rounded-2xl p-5 shadow-xl relative overflow-hidden`}>
                                    <div class="absolute right-[-20px] top-[-20px] w-32 h-32 bg-white opacity-10 rounded-full"></div>
                                    <div class="flex justify-between items-start">
                                        <span className={`${activeChallenge && !isChallengeExpired(activeChallenge) ? 'bg-white bg-opacity-25 text-xs text-white' : 'bg-gray-200 text-slate-500'} font-bold px-2.5 py-1 rounded-full uppercase tracking-wider`}>Défi Hebdo</span>
                                        <button 
                                            onClick={() => setShowAddChallengeModal(true)}
                                            className={`${activeChallenge && !isChallengeExpired(activeChallenge) ? 'bg-white text-purple-600' : 'bg-pink-500 text-white'} text-xs font-bold px-2 py-1 rounded-lg hover:bg-opacity-90 transition`}
                                        >
                                            Proposer un défi
                                        </button>
                                    </div>
                                    {activeChallenge ? (
                                        <>
                                            <h3 class="text-2xl font-bold mt-3 leading-snug">{activeChallenge.title}</h3>
                                            <p className={`text-sm ${activeChallenge && !isChallengeExpired(activeChallenge) ? 'text-purple-100' : 'text-slate-500'} mt-1`}>{activeChallenge.description || 'Un défi rapide à relever !'}</p>
                                            <div class="mt-4 grid gap-2 md:grid-cols-2">
                                                <span class={`inline-flex items-center rounded-full px-3 py-2 text-[11px] font-semibold ${isChallengeExpired(activeChallenge) ? 'bg-slate-200 text-slate-500' : 'bg-white bg-opacity-20 text-white'}`}>
                                                    {isChallengeExpired(activeChallenge) ? 'Défi expiré' : `Valide encore ${getChallengeRemaining(activeChallenge)}`}
                                                </span>
                                                <span class={`inline-flex items-center rounded-full px-3 py-2 text-[11px] font-semibold ${isChallengeExpired(activeChallenge) ? 'bg-slate-200 text-slate-500' : 'bg-white bg-opacity-20 text-white'}`}>
                                                    Créé le {new Date(activeChallenge.created_at).toLocaleDateString('fr-FR')}
                                                </span>
                                            </div>
                                            <div className={`mt-4 pt-4 border-t ${activeChallenge && !isChallengeExpired(activeChallenge) ? 'border-white border-opacity-20' : 'border-slate-200'} flex flex-col gap-3 md:flex-row md:items-center md:justify-between`}>
                                                <span className={`text-xs ${activeChallenge && !isChallengeExpired(activeChallenge) ? 'text-white' : 'text-slate-500'}`}>Rapporte +100 pts (+25 pts par Super Like)</span>
                                                <label className={`inline-flex items-center justify-center ${isChallengeExpired(activeChallenge) ? 'cursor-not-allowed opacity-60' : 'cursor-pointer'} bg-yellow-400 hover:bg-yellow-300 text-slate-900 font-bold text-xs px-4 py-2 rounded-xl shadow transition transform active:scale-95`}>
                                                    <i class="fa-solid fa-camera"></i>
                                                    <span>Relever le défi</span>
                                                    <input type="file" accept="image/*" onChange={handlePhotoUpload} class="hidden" disabled={isChallengeExpired(activeChallenge)} />
                                                </label>
                                            </div>
                                        </>
                                    ) : (
                                        <div class="mt-4 text-sm text-slate-500">
                                            <p>Aucun défi hebdomadaire actif en ce moment.</p>
                                            <p class="mt-2 text-xs text-slate-400">Crée un nouveau défi et fais participer toute la bande.</p>
                                        </div>
                                    )}
                                </div>

                                <div class="bg-white rounded-3xl p-4 shadow-sm border border-gray-100">
                                    <div class="flex items-center justify-between mb-4">
                                        <div>
                                            <h3 class="text-sm font-bold uppercase tracking-wider text-gray-500">Tous les défis</h3>
                                            <p class="text-[11px] text-gray-400">Voir l'historique et les réponses de chaque défi.</p>
                                        </div>
                                        <span class="text-[11px] text-gray-400">{challenges.length} défi(s)</span>
                                    </div>
                                    <div class="space-y-3">
                                        {challenges.length === 0 ? (
                                            <div class="rounded-3xl border border-dashed border-gray-200 p-4 text-center text-xs text-gray-400">Aucun défi créé pour le moment.</div>
                                        ) : challenges.map(challenge => {
                                            const expired = isChallengeExpired(challenge);
                                            const challengeSubs = submissions.filter(sub => sub.challenge_id === challenge.id);
                                            return (
                                                <div key={challenge.id} class={`rounded-3xl p-4 border ${expired ? 'bg-slate-50 border-slate-200 opacity-90' : 'bg-white border-gray-200'}`}>
                                                    <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3">
                                                        <div>
                                                            <p class="font-bold text-gray-800 text-sm">{challenge.title}</p>
                                                            <p class="text-[11px] text-gray-500 mt-1">{challenge.description || 'Aucune description fournie.'}</p>
                                                            <div class="mt-3 flex flex-wrap gap-2 text-[11px] text-gray-500">
                                                                <span class="rounded-full bg-slate-100 px-2 py-1">{expired ? 'Expiré' : `Encore ${getChallengeRemaining(challenge)}`}</span>
                                                                <span class="rounded-full bg-slate-100 px-2 py-1">Créé le {new Date(challenge.created_at).toLocaleDateString('fr-FR')}</span>
                                                            </div>
                                                        </div>
                                                        <button 
                                                            onClick={() => setExpandedChallengeId(expandedChallengeId === challenge.id ? null : challenge.id)}
                                                            class="self-start text-xs font-bold text-pink-500"
                                                        >
                                                            {expandedChallengeId === challenge.id ? 'Masquer les réponses' : 'Voir les réponses'} ({challengeSubs.length})
                                                        </button>
                                                    </div>
                                                    {expandedChallengeId === challenge.id && (
                                                        <div class="mt-4 space-y-3">
                                                            {challengeSubs.length === 0 ? (
                                                                <p class="text-xs text-gray-400">Aucune participation pour ce défi.</p>
                                                            ) : challengeSubs.map(sub => (
                                                                <div key={sub.id} class="rounded-2xl border border-gray-200 overflow-hidden">
                                                                    <div class="px-4 py-3 flex items-center justify-between gap-3 bg-slate-50">
                                                                        <div>
                                                                            <p class="font-bold text-gray-800 text-sm">{sub.user_name}</p>
                                                                            <p class="text-[11px] text-gray-500">{sub.user_city} • {getLocalTime(sub.user_timezone).substring(0, 5)} local</p>
                                                                        </div>
                                                                        <span class="text-[11px] text-slate-500">{sub.likes} SL</span>
                                                                    </div>
                                                                    <div class="bg-slate-100 overflow-hidden">
                                                                        <img src={sub.photo} alt="Preuve défi" class="w-full h-full object-contain max-h-[360px]" />
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- TAB LEADERBOARD --- */}
                        {activeTab === "leaderboard" && (
                            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                                <div class="text-center mb-6">
                                    <span class="text-4xl">🏆</span>
                                    <h2 class="text-xl font-bold text-gray-800 mt-2">Le Tableau d'Honneur</h2>
                                    <p class="text-xs text-gray-400">Qui est au sommet de sa zone de confort ?</p>
                                </div>

                                <div class="divide-y divide-gray-100">
                                    {members.length === 0 ? (
                                        <p class="text-xs text-gray-400 text-center py-4">Pas encore de membres enregistrés dans ce groupe.</p>
                                    ) : (
                                        members.sort((a,b) => b.points - a.points).map((mem, index) => (
                                            <div key={mem.id} class="py-3.5 flex items-center justify-between">
                                                <div class="flex items-center space-x-3">
                                                    <span class={`w-6 h-6 rounded-full flex items-center justify-center font-bold text-xs ${
                                                        index === 0 ? 'bg-yellow-400 text-yellow-950' :
                                                        index === 1 ? 'bg-slate-300 text-slate-800' :
                                                        index === 2 ? 'bg-amber-600 text-white' : 'bg-gray-100 text-gray-500'
                                                    }`}>
                                                        {index + 1}
                                                    </span>
                                                    <div>
                                                        <p class="font-bold text-gray-800 text-sm">{mem.name}</p>
                                                        <span class="text-[10px] text-gray-400 uppercase tracking-wider">{mem.city} • {getLocalTime(mem.timezone).substring(0, 5)}</span>
                                                    </div>
                                                </div>
                                                <div class="text-right">
                                                    <span class="font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-yellow-500">
                                                        {mem.points} pts
                                                    </span>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                        {/* --- TAB COMPTE / PARTAGE --- */}
                        {activeTab === "settings" && (
                            <div class="space-y-4">
                                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                                    <h2 class="text-md font-bold text-gray-800 mb-2">Partager ce groupe</h2>
                                    <p class="text-xs text-gray-500 mb-4 font-semibold">Donne ces identifiants à tes amis pour qu'ils rejoignent la tribu !</p>
                                    
                                    <div class="space-y-2 text-xs">
                                        <div class="flex justify-between border-b pb-2">
                                            <span class="text-gray-500">Identifiant Unique du groupe :</span>
                                            <span class="font-black text-pink-600">{activeGroupObj.id}</span>
                                        </div>
                                        <div class="flex justify-between border-b pb-2">
                                            <span class="text-gray-500">Mot de passe d'accès :</span>
                                            <span class="font-bold text-gray-800">{activeGroupObj.password}</span>
                                        </div>
                                    </div>
                                    <div class="mt-4 bg-yellow-50 text-yellow-800 p-3 rounded-xl text-[11px]">
                                        📢 <strong>Méthode pour rejoindre :</strong> Tes potes n'ont qu'à ouvrir le site, cliquer sur le bouton <strong>+</strong> en haut à droite, puis rentrer l'Identifiant et le Mot de passe.
                                    </div>
                                </div>

                                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 space-y-3">
                                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Ton compte</h3>
                                    <p class="text-xs text-gray-500">Modifie ton pseudo, ta photo de profil ou ton fuseau horaire.</p>
                                    <div class="flex flex-col gap-2">
                                        <button 
                                            onClick={() => setShowEditProfileModal(true)}
                                            class="w-full py-3 bg-pink-50 text-pink-600 rounded-xl font-bold text-xs hover:bg-pink-100 transition"
                                        >
                                            Modifier mon profil
                                        </button>
                                        <button 
                                            onClick={() => setShowCreateGroupModal(true)}
                                            class="w-full py-3 bg-slate-50 text-slate-800 rounded-xl font-bold text-xs hover:bg-slate-100 transition"
                                        >
                                            Créer un nouveau groupe
                                        </button>
                                    </div>
                                    <button 
                                        onClick={() => setShowDbSetup(true)}
                                        class="w-full py-3 bg-white text-blue-500 rounded-xl border border-blue-100 font-bold text-xs hover:bg-blue-50 transition"
                                    >
                                        Modifier la configuration Supabase URL / Clef
                                    </button>
                                </div>

                                <button 
                                    onClick={() => {
                                        localStorage.clear();
                                        window.location.reload();
                                    }}
                                    class="w-full py-3 bg-red-50 text-red-500 rounded-xl font-bold text-xs hover:bg-red-100 transition"
                                >
                                    Se déconnecter (Reset complet de l'appareil)
                                </button>
                            </div>
                        )}
                    </main>

                    {/* --- BARRE DE NAVIGATION DU BAS --- */}
                    <nav class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-2 flex justify-between items-center z-10 shadow-lg">
                        <button 
                            onClick={() => setActiveTab("feed")} 
                            class={`flex flex-col items-center space-y-1 ${activeTab === 'feed' ? 'text-pink-500' : 'text-gray-400'}`}
                        >
                            <i class="fa-solid fa-fire text-lg"></i>
                            <span class="text-[10px] font-bold">Défis</span>
                        </button>
                        
                        <button 
                            onClick={() => setActiveTab("leaderboard")} 
                            class={`flex flex-col items-center space-y-1 ${activeTab === 'leaderboard' ? 'text-pink-500' : 'text-gray-400'}`}
                        >
                            <i class="fa-solid fa-trophy text-lg"></i>
                            <span class="text-[10px] font-bold">Classement</span>
                        </button>

                        <button 
                            onClick={() => setShowAddChallengeModal(true)} 
                            title="Proposer un défi"
                            class="w-12 h-12 rounded-full bg-gradient-to-tr from-pink-500 to-yellow-500 text-white flex items-center justify-center shadow-lg -translate-y-4 hover:opacity-90 transform active:scale-95 transition"
                        >
                            <i class="fa-solid fa-plus text-lg"></i>
                        </button>

                        <button 
                            onClick={() => setActiveTab("settings")} 
                            class={`flex flex-col items-center space-y-1 ${activeTab === 'settings' ? 'text-pink-500' : 'text-gray-400'}`}
                        >
                            <i class="fa-solid fa-share-nodes text-lg"></i>
                            <span class="text-[10px] font-bold">Partager</span>
                        </button>
                    </nav>

                    {/* --- MODAL REJOINDRE GROUPE --- */}
                    {showJoinModal && (
                        <div class="absolute inset-0 bg-slate-950 bg-opacity-60 flex items-center justify-center z-50 p-4">
                            <div class="bg-white rounded-2xl p-6 w-full max-w-sm space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="font-bold text-gray-800 text-lg">Rejoindre un groupe</h3>
                                    <button onClick={() => setShowJoinModal(false)} class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleJoinGroup} class="space-y-3">
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Identifiant Unique du groupe</label>
                                        <input type="text" value={joinName} onChange={e => setJoinName(e.target.value)} placeholder="Ex: les-évadés" class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                    </div>
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Mot de passe du groupe</label>
                                        <input type="password" value={joinPassword} onChange={e => setJoinPassword(e.target.value)} class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                    </div>
                                    <button type="submit" class="w-full py-2.5 bg-pink-500 text-white font-bold text-sm rounded-xl">Rejoindre la tribu</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* --- MODAL CRÉER GROUPE --- */}
                    {showCreateGroupModal && (
                        <div class="absolute inset-0 bg-slate-950 bg-opacity-60 flex items-center justify-center z-50 p-4">
                            <div class="bg-white rounded-2xl p-6 w-full max-w-sm space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="font-bold text-gray-800 text-lg">Lancer un nouveau groupe</h3>
                                    <button onClick={() => setShowCreateGroupModal(false)} class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleCreateGroup} class="space-y-3">
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Nom du groupe</label>
                                        <input type="text" value={newGroupName} onChange={e => setNewGroupName(e.target.value)} placeholder="Ex: Les Évadés" class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                    </div>
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Mot de passe d'accès</label>
                                        <input type="password" value={newGroupPass} onChange={e => setNewGroupPass(e.target.value)} placeholder="Sélectionne un code d'accès" class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                    </div>
                                    <button type="submit" class="w-full py-2.5 bg-gradient-to-r from-pink-500 to-yellow-500 text-white font-bold text-sm rounded-xl">Lancer mon groupe 🚀</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* --- MODAL MODIFIER PROFIL --- */}
                    {showEditProfileModal && (
                        <div class="absolute inset-0 bg-slate-950 bg-opacity-60 flex items-center justify-center z-50 p-4">
                            <div class="bg-white rounded-2xl p-6 w-full max-w-sm space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="font-bold text-gray-800 text-lg">Modifier mon profil</h3>
                                    <button onClick={() => setShowEditProfileModal(false)} class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleEditProfile} class="space-y-3">
                                    <div class="flex flex-col items-center gap-3">
                                        <div class="w-24 h-24 rounded-full overflow-hidden bg-slate-100 flex items-center justify-center">
                                            {profilePhotoUrl ? (
                                                <img src={profilePhotoUrl} alt="Avatar" class="w-full h-full object-cover" />
                                            ) : (
                                                <span class="text-2xl text-slate-500">{currentUser.name?.substring(0,2).toUpperCase()}</span>
                                            )}
                                        </div>
                                        <label class="flex items-center justify-center gap-2 px-4 py-2 rounded-full bg-pink-50 text-pink-600 text-xs font-bold cursor-pointer hover:bg-pink-100 transition">
                                            <i class="fa-solid fa-camera"></i>
                                            <span>Changer la photo</span>
                                            <input type="file" accept="image/*" onChange={e => setEditAvatarFile(e.target.files[0])} class="hidden" />
                                        </label>
                                    </div>
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Pseudo</label>
                                        <input type="text" value={editName} onChange={e => setEditName(e.target.value)} class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                    </div>
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Ville</label>
                                        <input type="text" value={editCity} onChange={e => setEditCity(e.target.value)} class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                    </div>
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Fuseau horaire</label>
                                        <input type="text" value={editTimezone} onChange={e => setEditTimezone(e.target.value)} class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                    </div>
                                    <button type="submit" class="w-full py-2.5 bg-pink-500 text-white font-bold text-sm rounded-xl">Enregistrer les changements</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* --- MODAL CHANGER LE DÉFI --- */}
                    {showAddChallengeModal && (
                        <div class="absolute inset-0 bg-slate-950 bg-opacity-60 flex items-center justify-center z-50 p-4">
                            <div class="bg-white rounded-2xl p-6 w-full max-w-sm space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="font-bold text-gray-800 text-lg">Nouveau défi hebdomadaire</h3>
                                    <button onClick={() => setShowAddChallengeModal(false)} class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleAddChallenge} class="space-y-3">
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Intitulé du défi</label>
                                        <input type="text" value={newChallengeTitle} onChange={e => setNewChallengeTitle(e.target.value)} placeholder="Ex: Commander une boisson dans une autre langue" class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                    </div>
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Précisions (Optionnel)</label>
                                        <textarea value={newChallengeDesc} onChange={e => setNewChallengeDesc(e.target.value)} placeholder="Explique comment valider..." class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm h-20" />
                                    </div>
                                    <button type="submit" class="w-full py-2.5 bg-pink-500 text-white font-bold text-sm rounded-xl">Lancer le Défi !</button>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
