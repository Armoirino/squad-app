    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #fef08a 0%, #fbcfe8 100%);
            min-height: 100vh;
        }
        h1, h2, .brand-font {
            font-family: 'Comfortaa', display;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Avatar ring contrast */
        .avatar-ring {
            box-shadow: 0 0 0 3px #fff, 0 0 0 5px rgba(236,72,153,0.6);

        .lightbox-overlay {

        .lightbox-img {

        @keyframes zoomIn { from { transform:scale(0.88); opacity:0 } to { transform:scale(1); opacity:1 } }

        /* Toast notification */
        .toast {
            animation: slideUp 0.3s cubic-bezier(.22,.68,0,1.2) forwards;
        }
        .toast.hide {
            animation: slideDown 0.25s ease forwards;
        }
        @keyframes slideUp { from { transform:translateY(80px); opacity:0 } to { transform:translateY(0); opacity:1 } }

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const DEFAULT_SUPABASE_URL = "https://wbwscspbsmtbomewnpel.supabase.co";
        const DEFAULT_SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indid3Njc3Bic210Ym9tZXducGVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNzQ4NzQsImV4cCI6MjA5NDg1MDg3NH0.b3WOkpTVT2XnXGRPVS6rVUjSEDJbwsLzULPkpvOUFG0";

        // --- HASH SHA-256 côté client (pas de bcrypt nécessaire en browser) ---
        const hashPassword = async (password) => {
            const msgBuffer = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        };

        const compressImage = (base64Str, maxSize = 1080) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    if (width > height) {
                        if (width > maxSize) { height *= maxSize / width; width = maxSize; }
                    } else {
                        if (height > maxSize) { width *= maxSize / height; height = maxSize; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                };
            });
        };

        function App() {
            const [sbUrl, setSbUrl] = useState(() => localStorage.getItem('squad_sb_url') || DEFAULT_SUPABASE_URL);
            const [sbKey, setSbKey] = useState(() => localStorage.getItem('squad_sb_key') || DEFAULT_SUPABASE_KEY);
            const [supabaseClient, setSupabaseClient] = useState(null);

            const [groups, setGroups] = useState([]);
            const [members, setMembers] = useState([]);
            const [challenges, setChallenges] = useState([]);
            const [submissions, setSubmissions] = useState([]);
            
            const [currentUser, setCurrentUser] = useState(() => JSON.parse(localStorage.getItem('squad_current_user')) || null);
            const [currentGroup, setCurrentGroup] = useState(() => localStorage.getItem('squad_active_group_id') || "");
            
            const [activeTab, setActiveTab] = useState("feed");
            const [showGroupActionModal, setShowGroupActionModal] = useState(false);
            const [showAddChallengeModal, setShowAddChallengeModal] = useState(false);
            const [showCreateGroupModal, setShowCreateGroupModal] = useState(false);
            const [showDbSetup, setShowDbSetup] = useState(false);
            const [isLoading, setIsLoading] = useState(false);

            const [joinName, setJoinName] = useState("");
            const [joinPassword, setJoinPassword] = useState("");
            const [newGroupName, setNewGroupName] = useState("");
            const [newGroupPass, setNewGroupPass] = useState("");
            const [regUserName, setRegUserName] = useState("");
            const [regCity, setRegCity] = useState("");
            const [regPassword, setRegPassword] = useState("");
            const [regTimezone, setRegTimezone] = useState(Intl.DateTimeFormat().resolvedOptions().timeZone);
            // ---- NOUVEAU : photo d'inscription ----
            const [regAvatarFile, setRegAvatarFile] = useState(null);
            const [regAvatarPreview, setRegAvatarPreview] = useState("");
            // ----------------------------------------
            const [loginName, setLoginName] = useState("");
            const [loginPassword, setLoginPassword] = useState("");
            const [showLoginSection, setShowLoginSection] = useState(false);
            const [newChallengeTitle, setNewChallengeTitle] = useState("");
            const [newChallengeDesc, setNewChallengeDesc] = useState("");
            const [submissionDescription, setSubmissionDescription] = useState("");
            const [profilePhotoUrl, setProfilePhotoUrl] = useState("");
            const [editName, setEditName] = useState("");
            const [editCity, setEditCity] = useState("");
            const [editTimezone, setEditTimezone] = useState(Intl.DateTimeFormat().resolvedOptions().timeZone);
            const [editAvatarFile, setEditAvatarFile] = useState(null);
            const [showEditProfileModal, setShowEditProfileModal] = useState(false);
            const [expandedChallengeId, setExpandedChallengeId] = useState(null);
            const [carouselIndex, setCarouselIndex] = useState(0);
            const [showValidateModal, setShowValidateModal] = useState(false);
            const [validationChallenge, setValidationChallenge] = useState(null);
            const [validationFile, setValidationFile] = useState(null);
            const [validationDesc, setValidationDesc] = useState("");

            // --- LIGHTBOX ---
            const [lightboxSrc, setLightboxSrc] = useState(null);
            const [lightboxName, setLightboxName] = useState("");

            // --- CONFIRMATION QUITTER GROUPE ---
            const [showConfirmLeave, setShowConfirmLeave] = useState(false);

            // --- TOAST NOTIFICATIONS ---
            const [toasts, setToasts] = useState([]);
            const showToast = (msg, type = "success") => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, msg, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.map(t => t.id === id ? { ...t, hiding: true } : t));
                    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 300);
                }, 3200);
            };

            const timezoneOptions = [
                'Europe/Paris','Europe/London','Europe/Berlin','Europe/Moscow',
                'America/New_York','America/Toronto','America/Sao_Paulo','America/Mexico_City',
                'America/Los_Angeles','America/Chicago','Asia/Tokyo','Asia/Seoul',
                'Asia/Shanghai','Asia/Dubai','Asia/Kolkata','Australia/Sydney',
                'Australia/Melbourne','Africa/Cairo'
            ];

            const [timeTick, setTimeTick] = useState(new Date());

            const getTimezoneLabel = (tz) => {
                try {
                    const time = new Intl.DateTimeFormat('fr-FR', { timeZone: tz, hour: '2-digit', minute: '2-digit' }).format(timeTick);
                    return `${tz} (${time})`;
                } catch (e) { return tz; }
            };

            useEffect(() => {
                if (currentUser) {
                    setEditName(currentUser.name || "");
                    setEditCity(currentUser.city || "");
                    setEditTimezone(currentUser.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone);
                    setProfilePhotoUrl(currentUser.avatar_url || "");
                }
            }, [currentUser]);

            useEffect(() => {
                if (sbUrl && sbKey) {
                    try {
                        const client = supabase.createClient(sbUrl, sbKey);
                        setSupabaseClient(client);
                    } catch (e) { console.error("Erreur de connexion Supabase:", e); }
                }
            }, [sbUrl, sbKey]);

            useEffect(() => {
                const timer = setInterval(() => setTimeTick(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const getLocalTime = (tz) => {
                try {
                    return timeTick.toLocaleTimeString('fr-FR', { timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                } catch(e) { return timeTick.toLocaleTimeString('fr-FR'); }
            };

            const getChallengeExpiry = (challenge) => {
                if (challenge.expires_at) return new Date(challenge.expires_at);
                const createdAt = challenge.created_at ? new Date(challenge.created_at) : new Date();
                const expiry = new Date(createdAt);
                expiry.setDate(expiry.getDate() + 7);
                return expiry;
            };

            const getChallengeRemaining = (challenge) => {
                const diff = getChallengeExpiry(challenge) - new Date();
                if (diff <= 0) return "Expiré";
                const days = Math.floor(diff / 86400000);
                const hours = Math.floor((diff % 86400000) / 3600000);
                const minutes = Math.floor((diff % 3600000) / 60000);
                return `${days}j ${hours}h ${minutes}m`;
            };

            const isChallengeExpired = (challenge) => getChallengeExpiry(challenge).getTime() <= Date.now();

            const getChallengeRealityStatus = (challenge) => {
                if (isChallengeExpired(challenge)) return 'expired';
                return challenge.status || 'active';
            };

            const loadData = useCallback(async () => {
                if (!supabaseClient) return;
                setIsLoading(true);
                try {
                    let joinedGroupIds = [];
                    let activeId = currentGroup;

                    if (currentUser) {
                        const { data: memberRows } = await supabaseClient
                            .from('group_members').select('group_id').eq('profile_id', currentUser.id);
                        joinedGroupIds = (memberRows || []).map(m => m.group_id).filter(Boolean);
                        if (joinedGroupIds.length > 0) {
                            const { data: userGroups } = await supabaseClient
                                .from('groups').select('*').in('id', joinedGroupIds);
                            setGroups(userGroups || []);
                        } else { setGroups([]); }

                        if (!activeId && joinedGroupIds.length > 0) {
                            activeId = joinedGroupIds[0];
                            setCurrentGroup(activeId);
                            localStorage.setItem('squad_active_group_id', activeId);
                        }
                        if (activeId && !joinedGroupIds.includes(activeId)) {
                            activeId = "";
                            setCurrentGroup("");
                            localStorage.removeItem('squad_active_group_id');
                        }
                    } else { setGroups([]); }

                    if (!activeId) {
                        setMembers([]); setChallenges([]); setSubmissions([]); setExpandedChallengeId(null);
                        return;
                    }

                    const { data: mems } = await supabaseClient
                        .from('group_members').select('points, profiles(id, name, city, timezone, avatar_url)').eq('group_id', activeId);
                    const formattedMems = (mems || []).map(m => ({
                        id: m.profiles.id, name: m.profiles.name, city: m.profiles.city,
                        timezone: m.profiles.timezone, avatar_url: m.profiles.avatar_url, points: m.points
                    }));
                    setMembers(formattedMems);

                    const { data: challs } = await supabaseClient
                        .from('challenges').select('*').eq('group_id', activeId).order('created_at', { ascending: false });
                    setChallenges(challs || []);

                    const { data: subs } = await supabaseClient
                        .from('submissions').select('*').eq('group_id', activeId).order('created_at', { ascending: false });
                    setSubmissions(subs || []);
                } catch (error) {
                    console.error("Erreur de chargement :", error);
                } finally { setIsLoading(false); }
            }, [supabaseClient, currentGroup, currentUser]);

            useEffect(() => {
                if (supabaseClient) loadData();
            }, [supabaseClient, currentGroup, loadData]);

            // --- REFRESH AUTOMATIQUE toutes les 30 secondes ---
            const [lastRefresh, setLastRefresh] = useState(Date.now());
            useEffect(() => {
                if (!supabaseClient || !currentUser) return;
                const refreshInterval = setInterval(async () => {
                    await loadData();
                    setLastRefresh(Date.now());
                }, 30000);
                return () => clearInterval(refreshInterval);
            }, [supabaseClient, currentUser, loadData]);

            const handleGroupChange = (groupId) => {
                setCurrentGroup(groupId);
                if (groupId) { localStorage.setItem('squad_active_group_id', groupId); }
                else { localStorage.removeItem('squad_active_group_id'); }
                setMembers([]); setChallenges([]); setSubmissions([]); setExpandedChallengeId(null);
            };

            // ---- NOUVEAU : gestion de la photo d'inscription ----
            const handleRegAvatarChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setRegAvatarFile(file);
                const reader = new FileReader();
                reader.onloadend = () => setRegAvatarPreview(reader.result);
                reader.readAsDataURL(file);
            };
            // ------------------------------------------------------

            const handleRegister = async (e) => {
                e.preventDefault();
                if (!regUserName || !regCity || !supabaseClient) return;

                const userId = 'usr_' + Date.now();
                setIsLoading(true);
                try {
                    // ---- NOUVEAU : compression de la photo si elle existe ----
                    let avatarUrl = null;
                    if (regAvatarFile) {
                        const reader = new FileReader();
                        const fileData = await new Promise((resolve, reject) => {
                            reader.onloadend = () => resolve(reader.result);
                            reader.onerror = reject;
                            reader.readAsDataURL(regAvatarFile);
                        });
                        avatarUrl = await compressImage(fileData, 1080);
                    }
                    // ----------------------------------------------------------

                    const newUser = {
                        id: userId,
                        name: regUserName,
                        city: regCity,
                        timezone: regTimezone,
                        avatar_url: avatarUrl,
                        password: await hashPassword(regPassword)
                    };

                    await supabaseClient.from('profiles').insert([newUser]);
                    setCurrentUser(newUser);
                    localStorage.setItem('squad_current_user', JSON.stringify(newUser));
                    setProfilePhotoUrl(avatarUrl || "");

                    if (currentGroup) {
                        await supabaseClient.from('group_members').insert([{
                            group_id: currentGroup, profile_id: userId, points: 0
                        }]);
                        loadData();
                    }
                } catch (error) {
                    alert("Erreur lors de l'inscription : " + error.message);
                } finally { setIsLoading(false); }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                if (!loginName || !loginPassword || !supabaseClient) return;
                setIsLoading(true);
                try {
                    const { data, error } = await supabaseClient
                        .from('profiles').select('*').eq('name', loginName.trim()).single();
                    const hashedInput = await hashPassword(loginPassword);
                    if (error || !data || data.password !== hashedInput) {
                        alert("Pseudo ou mot de passe incorrect."); return;
                    }
                    setCurrentUser(data);
                    localStorage.setItem('squad_current_user', JSON.stringify(data));
                    setProfilePhotoUrl(data.avatar_url || "");
                    setShowLoginSection(false);
                } catch (err) { alert("Erreur de connexion : " + err.message); }
                finally { setIsLoading(false); }
            };

            const handleJoinGroup = async (e) => {
                e.preventDefault();
                if (!supabaseClient) return;
                setIsLoading(true);
                try {
                    const { data, error } = await supabaseClient
                        .from('groups').select('*').eq('id', joinName.toLowerCase().trim()).single();
                    if (data && data.password === joinPassword) {
                        setCurrentGroup(data.id);
                        localStorage.setItem('squad_active_group_id', data.id);
                        setShowGroupActionModal(false);
                        if (currentUser) {
                            await supabaseClient.from('group_members').upsert([{
                                group_id: data.id, profile_id: currentUser.id, points: 0
                            }]);
                        }
                        await loadData();
                        showToast(`Bienvenue dans le groupe : ${data.name} ! 🎉`);
                    } else { showToast("Groupe introuvable ou mot de passe incorrect.", "error"); }
                } catch (err) { alert("Erreur de connexion : " + err.message); }
                finally { setIsLoading(false); }
            };

            const handleCreateGroup = async (e) => {
                e.preventDefault();
                if (!newGroupName || !newGroupPass || !supabaseClient) return;
                const newId = newGroupName.toLowerCase().replace(/\s+/g, '-');
                setIsLoading(true);
                try {
                    await supabaseClient.from('groups').insert([{ id: newId, name: newGroupName, password: newGroupPass }]);
                    setShowCreateGroupModal(false);
                    await loadData();
                    showToast(`Groupe "${newGroupName}" créé ! Rejoins-le avec son identifiant. 🚀`);
                } catch (err) { alert("Erreur lors de la création : " + err.message); }
                finally { setIsLoading(false); }
            };

            const handleLeaveGroup = async () => {
                if (!supabaseClient || !currentGroup || !currentUser) return;
                setIsLoading(true);
                try {
                    await supabaseClient.from('group_members').delete()
                        .eq('group_id', currentGroup).eq('profile_id', currentUser.id);
                    setCurrentGroup("");
                    localStorage.removeItem('squad_active_group_id');
                    setShowGroupActionModal(false);
                    await loadData();
                    showToast("Tu as quitté le groupe.", "info");
                } catch (err) { alert("Erreur en quittant le groupe : " + err.message); }
                finally { setIsLoading(false); }
            };

            const handleAddChallenge = async (e) => {
                e.preventDefault();
                if (!newChallengeTitle || !supabaseClient) return;
                if (!currentGroup) { alert("Rejoins un groupe avant de proposer un défi."); return; }
                setIsLoading(true);
                try {
                    if (!currentUser) throw new Error("Connecte-toi pour proposer un défi.");
                    const weekAgoIso = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
                    const { data: recentChallenges } = await supabaseClient
                        .from('challenges').select('id').eq('created_by', currentUser.id)
                        .eq('group_id', currentGroup).gte('created_at', weekAgoIso).limit(1);
                    if (recentChallenges && recentChallenges.length > 0) {
                        alert("Tu as déjà proposé un défi cette semaine."); return;
                    }
                    await supabaseClient.from('challenges').insert([{
                        id: 'c_' + Date.now(), group_id: currentGroup, title: newChallengeTitle,
                        description: newChallengeDesc, status: "active",
                        expires_at: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString(),
                        created_by: currentUser.id
                    }]);
                    setShowAddChallengeModal(false);
                    setNewChallengeTitle(""); setNewChallengeDesc("");
                    await loadData();
                } catch (err) { alert("Erreur d'ajout du défi : " + err.message); }
                finally { setIsLoading(false); }
            };

            const handlePhotoUpload = (e) => {
                const file = e.target.files[0];
                if (!file || !currentUser || !supabaseClient) return;
                const activeChallenge = challenges.find(c => getChallengeRealityStatus(c) === "active");
                if (!activeChallenge) { alert("Aucun défi actif ou le défi est expiré."); return; }
                if (isChallengeExpired(activeChallenge)) { alert("Le défi a expiré."); return; }
                setIsLoading(true);
                const reader = new FileReader();
                reader.onloadend = async () => {
                    try {
                        const { data: existingSubmission } = await supabaseClient.from('submissions').select('id')
                            .eq('challenge_id', activeChallenge.id).eq('user_id', currentUser.id).limit(1);
                        if (existingSubmission && existingSubmission.length > 0) {
                            alert("Tu as déjà participé à ce défi."); setIsLoading(false); return;
                        }
                        const compressedB64 = await compressImage(reader.result, 1080);
                        const newSub = {
                            id: 'sub_' + Date.now(), group_id: currentGroup,
                            challenge_id: activeChallenge.id, user_id: currentUser.id,
                            user_name: currentUser.name, user_city: currentUser.city,
                            user_timezone: currentUser.timezone,
                            avatar_url: currentUser.avatar_url || profilePhotoUrl || null,
                            description: submissionDescription || null, photo: compressedB64,
                            likes: 0, liked_by: []
                        };
                        const { error } = await supabaseClient.from('submissions').insert([newSub]);
                        if (error) throw error;
                        const memberInfo = members.find(m => m.id === currentUser.id);
                        const currentPoints = memberInfo ? memberInfo.points : 0;
                        await supabaseClient.from('group_members')
                            .update({ points: currentPoints + 100 })
                            .eq('group_id', currentGroup).eq('profile_id', currentUser.id);
                        showToast("Défi relevé ! +100 points ! 🎉");
                        setSubmissionDescription("");
                        await loadData();
                    } catch (err) { alert("Erreur d'envoi : " + err.message); }
                    finally { setIsLoading(false); }
                };
                reader.readAsDataURL(file);
            };

            const openValidateModal = (challenge) => {
                setValidationChallenge(challenge); setValidationFile(null);
                setValidationDesc(""); setShowValidateModal(true);
            };

            const handleValidateSubmit = async (e) => {
                e && e.preventDefault && e.preventDefault();
                if (!validationChallenge || !validationFile || !currentUser || !supabaseClient) {
                    alert('Ajoute une photo pour valider le défi.'); return;
                }
                const existing = submissions.find(s => s.challenge_id === validationChallenge.id && s.user_id === currentUser.id);
                if (existing) { alert("Tu as déjà participé à ce défi."); setShowValidateModal(false); return; }
                setIsLoading(true);
                try {
                    const reader = new FileReader();
                    const fileData = await new Promise((resolve, reject) => {
                        reader.onloadend = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(validationFile);
                    });
                    const compressedB64 = await compressImage(fileData, 1080);
                    const newSub = {
                        id: 'sub_' + Date.now(), group_id: currentGroup,
                        challenge_id: validationChallenge.id, user_id: currentUser.id,
                        user_name: currentUser.name, user_city: currentUser.city,
                        user_timezone: currentUser.timezone,
                        avatar_url: currentUser.avatar_url || profilePhotoUrl || null,
                        description: validationDesc || null, photo: compressedB64,
                        likes: 0, liked_by: []
                    };
                    const { error } = await supabaseClient.from('submissions').insert([newSub]);
                    if (error) throw error;
                    const memberInfo = members.find(m => m.id === currentUser.id);
                    const currentPoints = memberInfo ? memberInfo.points : 0;
                    await supabaseClient.from('group_members')
                        .update({ points: currentPoints + 100 })
                        .eq('group_id', currentGroup).eq('profile_id', currentUser.id);
                    setShowValidateModal(false); setValidationChallenge(null);
                    await loadData();
                } catch (err) { alert('Erreur lors de la validation : ' + err.message); }
                finally { setIsLoading(false); }
            };

            const handleSetupDb = (e) => {
                e.preventDefault();
                localStorage.setItem('squad_sb_url', sbUrl);
                localStorage.setItem('squad_sb_key', sbKey);
                setShowDbSetup(false);
                window.location.reload();
            };

            const handleEditProfile = async (e) => {
                e.preventDefault();
                if (!currentUser || !supabaseClient) return;
                setIsLoading(true);
                try {
                    let avatarUrl = profilePhotoUrl;
                    if (editAvatarFile) {
                        const reader = new FileReader();
                        const blobResult = await new Promise((resolve, reject) => {
                            reader.onloadend = () => resolve(reader.result);
                            reader.onerror = reject;
                            reader.readAsDataURL(editAvatarFile);
                        });
                        avatarUrl = await compressImage(blobResult, 1080);
                    }
                    const updatedUser = { name: editName, city: editCity, timezone: editTimezone, avatar_url: avatarUrl };
                    const { error } = await supabaseClient.from('profiles').update(updatedUser).eq('id', currentUser.id);
                    if (error) throw error;
                    const mergedUser = { ...currentUser, ...updatedUser };
                    setCurrentUser(mergedUser);
                    localStorage.setItem('squad_current_user', JSON.stringify(mergedUser));
                    setProfilePhotoUrl(avatarUrl || "");
                    setShowEditProfileModal(false);
                    await loadData();
                } catch (err) { alert("Erreur lors de la mise à jour du profil : " + err.message); }
                finally { setIsLoading(false); }
            };

            const hasAlreadySuperLikedChallenge = (challengeId) => {
                if (!currentUser) return false;
                return submissions.some(sub => sub.challenge_id === challengeId && sub.liked_by?.includes(currentUser.id));
            };

            const handleSuperLike = async (subId) => {
                if (!currentUser || !supabaseClient) return;
                const submission = submissions.find(s => s.id === subId);
                const challengeForSubmission = challenges.find(c => c.id === submission?.challenge_id);
                if (!submission) return;
                if (submission.user_id === currentUser.id) { showToast("Tu ne peux pas t'attribuer ton propre Super Like ! 😉", "error"); return; }
                const alreadyLikedOtherSubmission = submissions.some(sub =>
                    sub.challenge_id === submission.challenge_id && sub.id !== subId && sub.liked_by?.includes(currentUser.id));
                if (alreadyLikedOtherSubmission) { showToast("Tu as déjà donné un Super Like sur un autre post de ce défi.", "error"); return; }
                const alreadyLiked = submission.liked_by && submission.liked_by.includes(currentUser.id);
                if (alreadyLiked) { showToast("Tu as déjà mis un Super Like sur cette proposition.", "error"); return; }
                if (!challengeForSubmission || getChallengeRealityStatus(challengeForSubmission) !== 'active') {
                    showToast("Ce défi n'est plus actif.", "error"); return;
                }
                setIsLoading(true);
                try {
                    const currentLikedBy = submission.liked_by || [];
                    const updatedLikedBy = [...currentLikedBy, currentUser.id];
                    const updatedLikesCount = (submission.likes || 0) + 1;
                    await supabaseClient.from('submissions')
                        .update({ likes: updatedLikesCount, liked_by: updatedLikedBy }).eq('id', subId);
                    const creatorMember = members.find(m => m.id === submission.user_id);
                    const creatorPoints = creatorMember ? creatorMember.points : 0;
                    await supabaseClient.from('group_members')
                        .update({ points: creatorPoints + 25 })
                        .eq('group_id', currentGroup).eq('profile_id', submission.user_id);
                    showToast("Super Like envoyé ! Ton pote gagne +25 points ! 🚀");
                    await loadData();
                } catch (err) { alert("Erreur de Super Like : " + err.message); }
                finally { setIsLoading(false); }
            };

            const activeGroupObj = groups.find(g => g.id === currentGroup) || { name: "SquadApp" };
            const activeChallenge = challenges.find(c => getChallengeRealityStatus(c) === "active");

            // --- ÉCRAN 1 : CONFIGURATION BASE DE DONNÉES ---
            if (!sbUrl || !sbKey || showDbSetup) {
                return (
                    <div class="p-6 flex flex-col justify-center items-center min-h-[600px] flex-grow bg-white">
                        <div class="text-center mb-6">
                            <span class="text-5xl">⚡</span>
                            <h1 class="text-2xl font-bold text-gray-800 mt-2">Connecte ta base de données</h1>
                            <p class="text-sm text-gray-500 mt-2">Colle ici tes identifiants Supabase gratuits.</p>
                        </div>
                        <form onSubmit={handleSetupDb} class="w-full space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Project URL</label>
                                <input type="text" value={sbUrl} onChange={e => setSbUrl(e.target.value)} placeholder="https://xxxxxx.supabase.co" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-pink-300 outline-none" required />
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">API Key (Anon Public Key)</label>
                                <input type="password" value={sbKey} onChange={e => setSbKey(e.target.value)} placeholder="eyJhbGciOi..." class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-pink-300 outline-none" required />
                            </div>
                            <button type="submit" class="w-full py-3 bg-gradient-to-r from-pink-500 to-yellow-500 text-white rounded-xl font-bold shadow-lg">
                                Connecter ma Base de Données 🔌
                            </button>
                        </form>
                    </div>
                );
            }

            // --- ÉCRAN 2 : INSCRIPTION ---
            if (!currentUser) {
                return (
                    <div class="p-6 flex flex-col justify-center items-center min-h-[500px] flex-grow bg-white overflow-y-auto">
                        <div class="text-center mb-6">
                            <span class="text-5xl">🔥</span>
                            <h1 class="text-3xl font-bold text-gray-800 mt-2">SquadApp</h1>
                            <p class="text-sm text-gray-500 mt-1">Sors de ta zone de confort avec tes potes</p>
                        </div>

                        <form onSubmit={handleRegister} class="w-full space-y-4">
                            <h2 class="text-lg font-bold text-gray-700">Crée ton profil</h2>

                            {/* ---- NOUVEAU : Upload de photo de profil ---- */}
                            <div class="flex flex-col items-center gap-3">
                                <div class="relative">
                                    <div class="w-24 h-24 rounded-full overflow-hidden bg-gradient-to-tr from-pink-200 to-yellow-200 flex items-center justify-center border-4 border-white shadow-lg">
                                        {regAvatarPreview ? (
                                            <img src={regAvatarPreview} alt="Aperçu photo de profil" class="w-full h-full object-cover" />
                                        ) : (
                                            <span class="text-4xl">😎</span>
                                        )}
                                    </div>
                                    <label class="absolute -bottom-1 -right-1 w-8 h-8 bg-pink-500 rounded-full flex items-center justify-center cursor-pointer shadow-md hover:bg-pink-600 transition">
                                        <i class="fa-solid fa-camera text-white text-xs"></i>
                                        <input type="file" accept="image/*" onChange={handleRegAvatarChange} class="hidden" />
                                    </label>
                                </div>
                                <p class="text-xs text-gray-400">
                                    {regAvatarPreview ? "Photo sélectionnée ✓" : "Ajoute une photo de profil (optionnel)"}
                                </p>
                            </div>
                            {/* -------------------------------------------- */}

                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Ton Prénom</label>
                                <input type="text" value={regUserName} onChange={e => setRegUserName(e.target.value)} placeholder="Ex: Alexandre" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-300 transition" required />
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Ta Ville Actuelle</label>
                                <input type="text" value={regCity} onChange={e => setRegCity(e.target.value)} placeholder="Ex: Tokyo, Paris, Montréal" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-300 transition" required />
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Fuseau horaire</label>
                                <select value={regTimezone} onChange={e => setRegTimezone(e.target.value)} class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-300 transition text-sm" required>
                                    {timezoneOptions.map(tz => (
                                        <option key={tz} value={tz}>{getTimezoneLabel(tz)}</option>
                                    ))}
                                </select>
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Mot de passe</label>
                                <input type="password" value={regPassword} onChange={e => setRegPassword(e.target.value)} placeholder="Choisis un mot de passe sécurisé" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-300 transition" required />
                            </div>

                            <div class="text-center text-sm text-gray-500 py-2 border-t border-gray-200">
                                Déjà un compte ? <button type="button" onClick={() => setShowLoginSection(!showLoginSection)} class="text-pink-600 font-bold hover:underline">Se connecter</button>
                            </div>

                            <button type="submit" disabled={isLoading} class="w-full py-3 bg-gradient-to-r from-pink-500 to-yellow-500 text-white rounded-xl font-bold shadow-lg disabled:opacity-50">
                                {isLoading ? "Création..." : "Commencer l'aventure 🚀"}
                            </button>
                        </form>

                        {showLoginSection && (
                            <form onSubmit={handleLogin} class="mt-4 space-y-4 bg-slate-50 p-4 rounded-3xl border border-gray-200 w-full">
                                <h3 class="text-sm font-bold text-gray-700">Connexion</h3>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Pseudo</label>
                                    <input type="text" value={loginName} onChange={e => setLoginName(e.target.value)} placeholder="Ton pseudo" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-300 transition" required />
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Mot de passe</label>
                                    <input type="password" value={loginPassword} onChange={e => setLoginPassword(e.target.value)} placeholder="Ton mot de passe" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-300 transition" required />
                                </div>
                                <button type="submit" class="w-full py-3 bg-white text-pink-600 rounded-xl font-bold border border-pink-100 hover:bg-pink-50 transition">Se connecter</button>
                            </form>
                        )}
                    </div>
                );
            }

            // --- ÉCRAN CENTRAL PRINCIPAL ---
            return (
                <div class="flex flex-col h-full flex-grow bg-slate-50 relative">
                    
                    {isLoading && (
                        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-pink-500 to-yellow-400 animate-pulse z-50"></div>
                    )}

                    <header class="bg-white px-4 py-3 shadow-sm border-b border-gray-100 flex items-center justify-between sticky top-0 z-10">
                        <div class="flex items-center space-x-3">
                            <div 
                                class="w-10 h-10 rounded-full overflow-hidden avatar-ring flex items-center justify-center text-white font-bold brand-font shadow cursor-pointer hover:scale-105 transition-transform"
                                onClick={() => { if (profilePhotoUrl) { setLightboxSrc(profilePhotoUrl); setLightboxName(currentUser.name); } }}
                            >
                                {profilePhotoUrl ? (
                                    <img src={profilePhotoUrl} alt="Avatar" class="w-full h-full object-cover" />
                                ) : (
                                    <div class="w-full h-full avatar-initials flex items-center justify-center text-sm">
                                        {currentUser?.name?.substring(0, 2).toUpperCase() || 'SQ'}
                                    </div>
                                )}
                            </div>
                            <div>
                                <h1 class="text-lg font-bold text-gray-800 leading-none">{currentUser.name}</h1>
                                <span class="text-[10px] text-gray-400">Heure Locale : {getLocalTime(currentUser.timezone)}</span>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <select value={currentGroup} onChange={e => handleGroupChange(e.target.value)} class="bg-gray-100 text-gray-800 text-xs font-bold rounded-lg px-2.5 py-1.5 focus:outline-none border-none cursor-pointer hover:bg-gray-200 transition" disabled={groups.length === 0}>
                                <option value="">{groups.length === 0 ? 'Aucun groupe rejoint' : 'Sélectionne un groupe'}</option>
                                {groups.map(g => (<option key={g.id} value={g.id}>{g.name}</option>))}
                            </select>
                            <button
                                onClick={async () => { await loadData(); setLastRefresh(Date.now()); showToast("Feed mis à jour ✓", "info"); }}
                                class="w-8 h-8 rounded-full bg-gray-100 hover:bg-pink-100 flex items-center justify-center text-gray-400 hover:text-pink-500 transition"
                                title="Actualiser"
                            >
                                <i class="fa-solid fa-rotate-right text-xs"></i>
                            </button>
                        </div>
                    </header>

                    <div class="bg-gradient-to-r from-slate-900 to-slate-800 text-white px-3 py-2 text-xs flex space-x-3 overflow-x-auto no-scrollbar shadow-inner">
                        {members.length === 0 ? (
                            <div class="text-[11px] text-slate-400">Aucun autre membre connecté. Invite tes amis !</div>
                        ) : members.map(m => (
                            <div key={m.id} class="flex items-center space-x-1.5 bg-slate-700 bg-opacity-50 px-2 py-1 rounded-full whitespace-nowrap">
                                <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
                                <span class="font-medium">{m.name}</span>
                                <span class="text-slate-300">({m.city})</span>
                                <span class="font-bold text-yellow-300">{getLocalTime(m.timezone).substring(0, 5)}</span>
                            </div>
                        ))}
                    </div>

                    <main class="flex-grow p-4 overflow-y-auto max-h-[640px] no-scrollbar pb-24">
                        
                        {activeTab === "feed" && (
                            <div class="space-y-4">
                                <div className={`${challenges.some(c => getChallengeRealityStatus(c) === 'active') ? 'bg-gradient-to-tr from-pink-500 via-purple-500 to-indigo-600 text-white' : 'bg-slate-100 text-slate-700'} rounded-2xl p-5 shadow-xl relative overflow-hidden`}>
                                    <div class="flex items-center justify-between mb-3">
                                        <h3 className={`${challenges.some(c => getChallengeRealityStatus(c) === 'active') ? 'text-white' : ''} font-bold`}>Défis actifs</h3>
                                        <span className={`${challenges.some(c => getChallengeRealityStatus(c) === 'active') ? 'text-white' : 'text-xs text-gray-400'}`}>{challenges.filter(c => getChallengeRealityStatus(c) === 'active').length} actif(s)</span>
                                    </div>
                                    {(() => {
                                        const activeChallenges = challenges.filter(c => getChallengeRealityStatus(c) === 'active' && !submissions.some(s => s.challenge_id === c.id && s.user_id === currentUser?.id));
                                        if (!activeChallenges || activeChallenges.length === 0) {
                                            return (
                                                <div className={`mt-4 text-sm ${challenges.some(c => getChallengeRealityStatus(c) === 'active') ? 'text-white' : 'text-slate-500'}`}>
                                                    <p>Aucun défi actif disponible pour toi en ce moment.</p>
                                                    <p className={`mt-2 text-xs ${challenges.some(c => getChallengeRealityStatus(c) === 'active') ? 'text-white' : 'text-slate-400'}`}>Rejoins ou attends qu'un pote propose un défi.</p>
                                                </div>
                                            );
                                        }
                                        const current = activeChallenges[carouselIndex % activeChallenges.length];
                                        return (
                                            <div>
                                                <div class="mb-4 flex items-center justify-between">
                                                    <div>
                                                        <p className={`text-2xl font-bold ${challenges.some(c => getChallengeRealityStatus(c) === 'active') ? 'text-white' : 'text-slate-800'}`}>{current.title}</p>
                                                        <p className={`text-sm ${challenges.some(c => getChallengeRealityStatus(c) === 'active') ? 'text-white' : 'text-slate-500'} mt-1`}>{current.description || 'Aucune description fournie.'}</p>
                                                    </div>
                                                    <div class="flex items-center gap-2">
                                                        <button onClick={() => setCarouselIndex((carouselIndex - 1 + activeChallenges.length) % activeChallenges.length)} className={`${challenges.some(c => getChallengeRealityStatus(c) === 'active') ? 'bg-blue-900 text-white' : 'bg-white text-slate-700'} px-3 py-2 rounded-full shadow-lg ring-1 ring-white/25 hover:shadow-2xl transform active:scale-95 transition`}>‹</button>
                                                        <button onClick={() => setCarouselIndex((carouselIndex + 1) % activeChallenges.length)} className={`${challenges.some(c => getChallengeRealityStatus(c) === 'active') ? 'bg-blue-900 text-white' : 'bg-white text-slate-700'} px-3 py-2 rounded-full shadow-lg ring-1 ring-white/25 hover:shadow-2xl transform active:scale-95 transition`}>›</button>
                                                    </div>
                                                </div>
                                                <div class="mt-2 border-t pt-4">
                                                    <div class="flex items-start gap-4">
                                                        <div class="flex-1 pr-4">
                                                            <p className={`${challenges.some(c => getChallengeRealityStatus(c) === 'active') ? 'text-white' : 'text-xs text-gray-400'}`}>Temps restant</p>
                                                            <p className={`font-bold text-lg ${challenges.some(c => getChallengeRealityStatus(c) === 'active') ? 'text-white' : ''}`}>{getChallengeRemaining(current)}</p>
                                                            <p className={`${challenges.some(c => getChallengeRealityStatus(c) === 'active') ? 'text-white' : 'text-xs text-gray-400'} mt-2`}>Rapporte +100 pts (+25 pts par Super Like)</p>
                                                        </div>
                                                    </div>
                                                    <div class="mt-4 flex items-center justify-center">
                                                        <button onClick={() => openValidateModal(current)} class="w-full py-3 bg-gradient-to-r from-pink-500 to-yellow-500 text-white font-bold rounded-xl shadow-lg ring-1 ring-white/25 hover:shadow-2xl transform active:scale-95 transition">Valider le défi</button>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })()}
                                </div>

                                <div class="bg-white rounded-3xl p-4 shadow-sm border border-gray-100">
                                    <div class="flex items-center justify-between mb-4">
                                        <div>
                                            <h3 class="text-sm font-bold uppercase tracking-wider text-gray-500">Tous les défis</h3>
                                            <p class="text-[11px] text-gray-400">Voir l'historique et les réponses de chaque défi.</p>
                                        </div>
                                        <span class="text-[11px] text-gray-400">{challenges.length} défi(s)</span>
                                    </div>
                                    <div class="space-y-3">
                                        {challenges.length === 0 ? (
                                            <div class="rounded-3xl border border-dashed border-gray-200 p-4 text-center text-xs text-gray-400">Aucun défi créé pour le moment.</div>
                                        ) : challenges.map(challenge => {
                                            const expired = isChallengeExpired(challenge);
                                            const challengeSubs = submissions.filter(sub => sub.challenge_id === challenge.id);
                                            return (
                                                <div key={challenge.id} class={`rounded-3xl p-4 border ${expired ? 'bg-slate-50 border-slate-200 opacity-90' : 'bg-white border-gray-200'}`}>
                                                    <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3">
                                                        <div>
                                                            <p class="font-bold text-gray-800 text-sm">{challenge.title}</p>
                                                            <p class="text-[11px] text-gray-500 mt-1">{challenge.description || 'Aucune description fournie.'}</p>
                                                            <div class="mt-3 flex flex-wrap gap-2 text-[11px] text-gray-500">
                                                                <span class="rounded-full bg-slate-100 px-2 py-1">{expired ? 'Expiré' : `Encore ${getChallengeRemaining(challenge)}`}</span>
                                                            </div>
                                                        </div>
                                                        <button onClick={() => setExpandedChallengeId(expandedChallengeId === challenge.id ? null : challenge.id)} class="self-start text-xs font-bold text-pink-500">
                                                            {expandedChallengeId === challenge.id ? 'Masquer les réponses' : 'Voir les réponses'} ({challengeSubs.length})
                                                        </button>
                                                    </div>
                                                    {expandedChallengeId === challenge.id && (
                                                        <div class="mt-4 space-y-3">
                                                            {challengeSubs.length === 0 ? (
                                                                <p class="text-xs text-gray-400">Aucune participation pour ce défi.</p>
                                                            ) : challengeSubs.map(sub => (
                                                                <div key={sub.id} class="rounded-2xl border border-gray-200 overflow-hidden">
                                                                    <div class="px-4 py-3 flex items-center justify-between gap-3 bg-slate-50">
                                                                        <div class="flex items-center gap-3">
                                                                            <div 
                                                                                class="w-10 h-10 rounded-full overflow-hidden avatar-ring flex items-center justify-center font-bold cursor-pointer hover:scale-105 transition-transform flex-shrink-0"
                                                                                onClick={() => { const av = sub.avatar_url || (members.find(m => m.id === sub.user_id) && members.find(m => m.id === sub.user_id).avatar_url); if (av) { setLightboxSrc(av); setLightboxName(sub.user_name); } }}
                                                                            >
                                                                                {(sub.avatar_url || (members.find(m => m.id === sub.user_id) && members.find(m => m.id === sub.user_id).avatar_url)) ? (
                                                                                    <img src={sub.avatar_url || members.find(m => m.id === sub.user_id).avatar_url} alt="Avatar" class="w-full h-full object-cover" />
                                                                                ) : (
                                                                                    <div class="w-full h-full avatar-initials flex items-center justify-center text-sm">{sub.user_name?.substring(0,2).toUpperCase()}</div>
                                                                                )}
                                                                            </div>
                                                                            <div>
                                                                                <p class="font-bold text-gray-800 text-sm">{sub.user_name}</p>
                                                                                <p class="text-[11px] text-gray-500">{sub.user_city} • {getLocalTime(sub.user_timezone).substring(0, 5)} local</p>
                                                                            </div>
                                                                        </div>
                                                                        <div class="flex items-center gap-2">
                                                                            <span class="text-[11px] text-slate-500">{sub.likes} SL</span>
                                                                            {currentUser && getChallengeRealityStatus(challenge) === 'active' && !isChallengeExpired(challenge) && sub.user_id !== currentUser.id && (
                                                                                <button
                                                                                    onClick={() => handleSuperLike(sub.id)}
                                                                                    disabled={hasAlreadySuperLikedChallenge(challenge.id) || sub.liked_by?.includes(currentUser.id)}
                                                                                    className={`text-[11px] font-bold rounded-full px-3 py-1 transition ${sub.liked_by?.includes(currentUser.id) ? 'bg-pink-100 text-pink-600' : hasAlreadySuperLikedChallenge(challenge.id) ? 'bg-slate-200 text-slate-500 cursor-not-allowed' : 'bg-pink-500 text-white hover:bg-pink-400'}`}
                                                                                >
                                                                                    {sub.liked_by?.includes(currentUser.id) ? 'Super Liké' : hasAlreadySuperLikedChallenge(challenge.id) ? 'Déjà liké' : 'Super Like'}
                                                                                </button>
                                                                            )}
                                                                        </div>
                                                                    </div>
                                                                    <div class="bg-slate-100 overflow-hidden pb-4 cursor-pointer" onClick={() => { setLightboxSrc(sub.photo); setLightboxName(sub.user_name); }}>
                                                                        <img src={sub.photo} alt="Preuve défi" class="w-full h-full object-contain max-h-[360px] hover:opacity-95 transition-opacity" />
                                                                        <p class="text-center text-[10px] text-slate-400 mt-1">Appuie pour agrandir</p>
                                                                    </div>
                                                                    {sub.description && (
                                                                        <p class="mt-3 mb-3 px-2 text-sm text-gray-600">{sub.description}</p>
                                                                    )}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === "groups" && (
                            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                                <div class="text-center mb-4">
                                    <h2 class="text-xl font-bold text-gray-800">Groupes</h2>
                                    <p class="text-sm text-gray-500">Rejoins un groupe existant ou crée le tien.</p>
                                </div>
                                <div class="grid gap-4 grid-cols-1">
                                    <div class="bg-slate-50 rounded-3xl p-5 border border-gray-100">
                                        <h4 class="text-sm font-bold text-gray-700 mb-3">Rejoindre un groupe</h4>
                                        <form onSubmit={handleJoinGroup} class="space-y-3">
                                            <div>
                                                <label class="block text-xs text-gray-400 mb-1">Identifiant du groupe</label>
                                                <input type="text" value={joinName} onChange={e => setJoinName(e.target.value)} class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                            </div>
                                            <div>
                                                <label class="block text-xs text-gray-400 mb-1">Mot de passe du groupe</label>
                                                <input type="password" value={joinPassword} onChange={e => setJoinPassword(e.target.value)} class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                            </div>
                                            <button type="submit" class="w-full py-2.5 bg-pink-500 text-white font-bold text-sm rounded-xl">Rejoindre</button>
                                        </form>
                                    </div>
                                    <div class="bg-slate-50 rounded-3xl p-5 border border-gray-100">
                                        <h4 class="text-sm font-bold text-gray-700 mb-3">Créer un groupe</h4>
                                        <form onSubmit={handleCreateGroup} class="space-y-3">
                                            <div>
                                                <label class="block text-xs text-gray-400 mb-1">Nom du groupe</label>
                                                <input type="text" value={newGroupName} onChange={e => setNewGroupName(e.target.value)} placeholder="Ex: Les Évadés" class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                            </div>
                                            <div>
                                                <label class="block text-xs text-gray-400 mb-1">Mot de passe d'accès</label>
                                                <input type="password" value={newGroupPass} onChange={e => setNewGroupPass(e.target.value)} placeholder="Sélectionne un code d'accès" class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                            </div>
                                            <button type="submit" class="w-full py-2.5 bg-slate-900 text-white font-bold text-sm rounded-xl">Créer un groupe</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === "leaderboard" && (
                            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                                <div class="text-center mb-6">
                                    <span class="text-4xl">🏆</span>
                                    <h2 class="text-xl font-bold text-gray-800 mt-2">Le Tableau d'Honneur</h2>
                                    <p class="text-xs text-gray-400">Qui est au sommet de sa zone de confort ?</p>
                                </div>
                                <div class="divide-y divide-gray-100">
                                    {members.length === 0 ? (
                                        <p class="text-xs text-gray-400 text-center py-4">Pas encore de membres enregistrés dans ce groupe.</p>
                                    ) : (
                                        [...members].sort((a,b) => b.points - a.points).map((mem, index) => (
                                            <div key={mem.id} class="py-3.5 flex items-center justify-between">
                                                <div class="flex items-center space-x-3">
                                                    <span class={`w-6 h-6 rounded-full flex items-center justify-center font-bold text-xs flex-shrink-0 ${index === 0 ? 'bg-yellow-400 text-yellow-950' : index === 1 ? 'bg-slate-300 text-slate-800' : index === 2 ? 'bg-amber-600 text-white' : 'bg-gray-100 text-gray-500'}`}>
                                                        {index + 1}
                                                    </span>
                                                    <div 
                                                        class="w-9 h-9 rounded-full overflow-hidden avatar-ring cursor-pointer hover:scale-105 transition-transform flex-shrink-0"
                                                        onClick={() => { if (mem.avatar_url) { setLightboxSrc(mem.avatar_url); setLightboxName(mem.name); } }}
                                                    >
                                                        {mem.avatar_url ? (
                                                            <img src={mem.avatar_url} alt={mem.name} class="w-full h-full object-cover" />
                                                        ) : (
                                                            <div class="w-full h-full avatar-initials flex items-center justify-center text-xs">{mem.name?.substring(0,2).toUpperCase()}</div>
                                                        )}
                                                    </div>
                                                    <div>
                                                        <p class="font-bold text-gray-800 text-sm">{mem.name}</p>
                                                        <span class="text-[10px] text-gray-400 uppercase tracking-wider">{mem.city} • {getLocalTime(mem.timezone).substring(0, 5)}</span>
                                                    </div>
                                                </div>
                                                <div class="text-right">
                                                    <span class="font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-yellow-500">{mem.points} pts</span>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === "settings" && (
                            <div class="space-y-4">
                                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 space-y-3">
                                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Ton compte</h3>
                                    <div class="flex flex-col gap-2">
                                        <button onClick={() => setShowEditProfileModal(true)} class="w-full py-3 bg-pink-50 text-pink-600 rounded-xl font-bold text-xs hover:bg-pink-100 transition">Modifier mon profil</button>
                                        <button onClick={() => setShowCreateGroupModal(true)} class="w-full py-3 bg-slate-50 text-slate-800 rounded-xl font-bold text-xs hover:bg-slate-100 transition">Créer un nouveau groupe</button>
                                    </div>
                                    {currentGroup && (
                                        <button onClick={() => setShowConfirmLeave(true)} class="w-full py-3 bg-red-50 text-red-500 rounded-xl font-bold text-xs hover:bg-red-100 transition">Quitter le groupe</button>
                                    )}
                                    <a href="https://www.instagram.com/antonio44360/" target="_blank" rel="noopener noreferrer" class="w-full inline-block text-center">
                                        <button class="w-full py-3 bg-white text-pink-600 rounded-xl border border-pink-100 font-bold text-xs hover:bg-pink-50 transition">Contacter le support</button>
                                    </a>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-2 z-10 shadow-lg">
                        <div class="flex items-center justify-between max-w-lg mx-auto">
                            <button onClick={() => setActiveTab("groups")} title="Groupes" className={`flex flex-col items-center space-y-1 ${activeTab === 'groups' ? 'text-pink-500' : 'text-gray-400'} flex-1`}>
                                <i class="fa-solid fa-user text-lg"></i>
                                <span class="text-[10px] font-bold">Groupes</span>
                            </button>
                            <button onClick={() => setActiveTab("feed")} class={`flex flex-col items-center space-y-1 ${activeTab === 'feed' ? 'text-pink-500' : 'text-gray-400'} flex-1`}>
                                <i class="fa-solid fa-fire text-lg"></i>
                                <span class="text-[10px] font-bold">Défis</span>
                            </button>
                            <button onClick={() => setShowAddChallengeModal(true)} title="Proposer un défi" class="w-14 h-14 rounded-full bg-gradient-to-tr from-pink-500 to-yellow-500 text-white flex items-center justify-center shadow-lg hover:opacity-90 transform active:scale-95 transition mx-2">
                                <i class="fa-solid fa-plus text-lg"></i>
                            </button>
                            <button onClick={() => setActiveTab("leaderboard")} class={`flex flex-col items-center space-y-1 ${activeTab === 'leaderboard' ? 'text-pink-500' : 'text-gray-400'} flex-1`}>
                                <i class="fa-solid fa-trophy text-lg"></i>
                                <span class="text-[10px] font-bold">Classement</span>
                            </button>
                            <button onClick={() => setActiveTab("settings")} class={`flex flex-col items-center space-y-1 ${activeTab === 'settings' ? 'text-pink-500' : 'text-gray-400'} flex-1`}>
                                <i class="fa-solid fa-gear text-lg"></i>
                                <span class="text-[10px] font-bold">Paramètres</span>
                            </button>
                        </div>
                    </nav>

                    {showValidateModal && validationChallenge && (
                        <div class="absolute inset-0 bg-slate-950 bg-opacity-60 flex items-center justify-center z-50 p-4">
                            <div class="bg-white rounded-2xl p-6 w-full max-w-md space-y-4 relative">
                                <div class="flex justify-between items-center">
                                    <h3 class="font-bold text-gray-800 text-lg">Valider : {validationChallenge.title}</h3>
                                    <button onClick={() => setShowValidateModal(false)} class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                                <p class="text-sm text-gray-500">{validationChallenge.description}</p>
                                <p class="text-xs text-gray-400">Temps restant : {getChallengeRemaining(validationChallenge)}</p>
                                <form onSubmit={handleValidateSubmit} class="space-y-3">
                                    <div class="flex flex-col items-center gap-3">
                                        <label class="flex items-center justify-center gap-2 px-4 py-2 rounded-full bg-pink-50 text-pink-600 text-xs font-bold cursor-pointer hover:bg-pink-100 transition">
                                            <i class="fa-solid fa-camera"></i>
                                            <span>Ajouter une photo</span>
                                            <input type="file" accept="image/*" onChange={e => setValidationFile(e.target.files[0])} class="hidden" required />
                                        </label>
                                        <textarea value={validationDesc} onChange={e => setValidationDesc(e.target.value)} placeholder="Ajoute une description (optionnel)" class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm h-24" />
                                    </div>
                                    <div class="flex items-center justify-between">
                                        <button type="submit" class="py-2 px-4 bg-pink-500 text-white font-bold rounded-xl">Valider et envoyer</button>
                                        <button type="button" onClick={() => setShowValidateModal(false)} class="py-2 px-4 bg-white border rounded-xl">Annuler</button>
                                    </div>
                                </form>
                                <div class="text-xs text-gray-400 mt-2">Rapporte +100 pts (+25 pts par Super Like)</div>
                            </div>
                        </div>
                    )}

                    {showCreateGroupModal && (
                        <div class="absolute inset-0 bg-slate-950 bg-opacity-60 flex items-center justify-center z-50 p-4">
                            <div class="bg-white rounded-2xl p-6 w-full max-w-sm space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="font-bold text-gray-800 text-lg">Lancer un nouveau groupe</h3>
                                    <button onClick={() => setShowCreateGroupModal(false)} class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleCreateGroup} class="space-y-3">
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Nom du groupe</label>
                                        <input type="text" value={newGroupName} onChange={e => setNewGroupName(e.target.value)} placeholder="Ex: Les Évadés" class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                    </div>
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Mot de passe d'accès</label>
                                        <input type="password" value={newGroupPass} onChange={e => setNewGroupPass(e.target.value)} placeholder="Sélectionne un code d'accès" class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                    </div>
                                    <button type="submit" class="w-full py-2.5 bg-gradient-to-r from-pink-500 to-yellow-500 text-white font-bold text-sm rounded-xl">Lancer mon groupe 🚀</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {showEditProfileModal && (
                        <div class="absolute inset-0 bg-slate-950 bg-opacity-60 flex items-center justify-center z-50 p-4">
                            <div class="bg-white rounded-2xl p-6 w-full max-w-sm space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="font-bold text-gray-800 text-lg">Modifier mon profil</h3>
                                    <button onClick={() => setShowEditProfileModal(false)} class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleEditProfile} class="space-y-3">
                                    <div class="flex flex-col items-center gap-3">
                                        <div class="w-24 h-24 rounded-full overflow-hidden bg-slate-100 flex items-center justify-center">
                                            {profilePhotoUrl ? (
                                                <img src={profilePhotoUrl} alt="Avatar" class="w-full h-full object-cover" />
                                            ) : (
                                                <span class="text-2xl text-slate-500">{currentUser.name?.substring(0,2).toUpperCase()}</span>
                                            )}
                                        </div>
                                        <label class="flex items-center justify-center gap-2 px-4 py-2 rounded-full bg-pink-50 text-pink-600 text-xs font-bold cursor-pointer hover:bg-pink-100 transition">
                                            <i class="fa-solid fa-camera"></i>
                                            <span>Changer la photo</span>
                                            <input type="file" accept="image/*" onChange={e => setEditAvatarFile(e.target.files[0])} class="hidden" />
                                        </label>
                                    </div>
