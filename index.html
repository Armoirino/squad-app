<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SquadApp - Défis entre Potes</title>
    <!-- Tailwind CSS pour un design moderne et responsive -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icônes FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts pour un look moderne et chaleureux -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & Babel CDN pour faire tourner l'application sans build -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #fef08a 0%, #fbcfe8 100%);
            min-height: 100vh;
        }
        h1, h2, .brand-font {
            font-family: 'Comfortaa', display;
        }
        /* Style pour masquer la scrollbar mais garder le défilement */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 flex justify-center items-start md:items-center py-0 md:py-8">

    <!-- Container principal simulant un téléphone portable sur PC -->
    <div id="root" class="w-full max-w-md bg-white min-h-screen md:min-h-[850px] md:max-h-[850px] md:rounded-3xl md:shadow-2xl overflow-hidden flex flex-col border border-pink-100 relative"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DONNÉES DE DÉPART PAR DÉFAUT SI VIDE ---
        const DEFAULT_GROUPS = [
            { id: "world-tour", name: "Les Aventuriers 🌍", password: "123" },
            { id: "family", name: "La Famille ❤️", password: "mama" }
        ];

        const DEFAULT_MEMBERS = {
            "world-tour": [
                { id: "1", name: "Alexandre", city: "Tokyo", timezone: "Asia/Tokyo", points: 120 },
                { id: "2", name: "Léa", city: "Paris", timezone: "Europe/Paris", points: 85 },
                { id: "3", name: "Thomas", city: "Montréal", timezone: "America/Montreal", points: 95 }
            ],
            "family": [
                { id: "4", name: "Maman", city: "Lyon", timezone: "Europe/Paris", points: 210 },
                { id: "5", name: "Papa", city: "Lyon", timezone: "Europe/Paris", points: 150 }
            ]
        };

        const DEFAULT_CHALLENGES = {
            "world-tour": [
                { id: "c1", title: "Manger un plat ultra épicé 🌶️", description: "Prends-toi en photo en train de souffrir !", status: "active" }
            ],
            "family": [
                { id: "c2", title: "Cuisiner une nouvelle recette 🍕", description: "Pas le droit aux pâtes au beurre !", status: "active" }
            ]
        };

        const DEFAULT_SUBMISSIONS = {
            "world-tour": [
                { id: "s1", challengeId: "c1", userId: "1", userName: "Alexandre", userCity: "Tokyo", userTimezone: "Asia/Tokyo", photo: "https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?w=500&auto=format&fit=crop", likes: 2 },
                { id: "s2", challengeId: "c1", userId: "3", userName: "Thomas", userCity: "Montréal", userTimezone: "America/Montreal", photo: "https://images.unsplash.com/photo-1559181567-c3190ca9959b?w=500&auto=format&fit=crop", likes: 1 }
            ],
            "family": []
        };

        function App() {
            // --- ÉTATS DE L'APPLICATION ---
            const [groups, setGroups] = useState(() => JSON.parse(localStorage.getItem('squad_groups')) || DEFAULT_GROUPS);
            const [members, setMembers] = useState(() => JSON.parse(localStorage.getItem('squad_members')) || DEFAULT_MEMBERS);
            const [challenges, setChallenges] = useState(() => JSON.parse(localStorage.getItem('squad_challenges')) || DEFAULT_CHALLENGES);
            const [submissions, setSubmissions] = useState(() => JSON.parse(localStorage.getItem('squad_submissions')) || DEFAULT_SUBMISSIONS);
            
            // Session utilisateur local
            const [currentUser, setCurrentUser] = useState(() => JSON.parse(localStorage.getItem('squad_current_user')) || null);
            const [currentGroup, setCurrentGroup] = useState(() => localStorage.getItem('squad_active_group_id') || "world-tour");
            
            // États d'affichage & Formulaires
            const [activeTab, setActiveTab] = useState("feed"); // feed, leaderboard, settings
            const [showJoinModal, setShowJoinModal] = useState(false);
            const [showCreateModal, setShowCreateModal] = useState(false);
            const [showAddChallengeModal, setShowAddChallengeModal] = useState(false);
            
            // Inputs formulaires
            const [joinName, setJoinName] = useState("");
            const [joinPassword, setJoinPassword] = useState("");
            const [newGroupName, setNewGroupName] = useState("");
            const [newGroupPass, setNewGroupPass] = useState("");
            const [regUserName, setRegUserName] = useState("");
            const [regCity, setRegCity] = useState("");
            const [regTimezone, setRegTimezone] = useState(Intl.DateTimeFormat().resolvedOptions().timeZone);
            const [newChallengeTitle, setNewChallengeTitle] = useState("");
            const [newChallengeDesc, setNewChallengeDesc] = useState("");
            
            // Heures dynamiques mises à jour toutes les secondes
            const [timeTick, setTimeTick] = useState(new Date());

            // --- SAUVEGARDE LOCALE DYNAMIQUE ---
            useEffect(() => {
                localStorage.setItem('squad_groups', JSON.stringify(groups));
                localStorage.setItem('squad_members', JSON.stringify(members));
                localStorage.setItem('squad_challenges', JSON.stringify(challenges));
                localStorage.setItem('squad_submissions', JSON.stringify(submissions));
                if (currentUser) {
                    localStorage.setItem('squad_current_user', JSON.stringify(currentUser));
                }
                localStorage.setItem('squad_active_group_id', currentGroup);
            }, [groups, members, challenges, submissions, currentUser, currentGroup]);

            // Horloge temps réel
            useEffect(() => {
                const timer = setInterval(() => setTimeTick(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // Fonction pour avoir l'heure d'un fuseau précis
            const getLocalTime = (tz) => {
                try {
                    return timeTick.toLocaleTimeString('fr-FR', {
                        timeZone: tz,
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                } catch(e) {
                    return timeTick.toLocaleTimeString('fr-FR');
                }
            };

            // --- INCRIPTION DE L'UTILISATEUR ---
            const handleRegister = (e) => {
                e.preventDefault();
                if (!regUserName || !regCity) return;
                
                const newUser = {
                    id: 'usr_' + Date.now(),
                    name: regUserName,
                    city: regCity,
                    timezone: regTimezone
                };
                
                setCurrentUser(newUser);
                
                // On l'ajoute automatiquement au groupe actif par défaut
                const groupMembers = members[currentGroup] || [];
                if (!groupMembers.some(m => m.name.toLowerCase() === regUserName.toLowerCase())) {
                    const updated = [...groupMembers, { ...newUser, points: 0 }];
                    setMembers({ ...members, [currentGroup]: updated });
                }
            };

            // --- REJOINDRE UN GROUPE EXISTANT ---
            const handleJoinGroup = (e) => {
                e.preventDefault();
                const found = groups.find(g => g.id.toLowerCase() === joinName.toLowerCase() || g.name.toLowerCase() === joinName.toLowerCase());
                if (found && found.password === joinPassword) {
                    setCurrentGroup(found.id);
                    setShowJoinModal(false);
                    
                    // Ajouter l'utilisateur actuel aux membres du groupe s'il n'y est pas
                    if (currentUser) {
                        const groupMembers = members[found.id] || [];
                        if (!groupMembers.some(m => m.id === currentUser.id)) {
                            setMembers({
                                ...members,
                                [found.id]: [...groupMembers, { ...currentUser, points: 0 }]
                            });
                        }
                    }
                    alert(`Bienvenue dans le groupe : ${found.name} !`);
                } else {
                    alert("Nom du groupe ou mot de passe incorrect.");
                }
            };

            // --- CRÉER UN NOUVEAU GROUPE ---
            const handleCreateGroup = (e) => {
                e.preventDefault();
                if (!newGroupName || !newGroupPass) return;
                
                const newId = newGroupName.toLowerCase().replace(/\s+/g, '-');
                if (groups.some(g => g.id === newId)) {
                    alert("Ce nom de groupe est déjà pris !");
                    return;
                }

                const newGrp = { id: newId, name: newGroupName, password: newGroupPass };
                setGroups([...groups, newGrp]);
                setMembers({
                    ...members,
                    [newId]: currentUser ? [{ ...currentUser, points: 0 }] : []
                });
                setChallenges({
                    ...challenges,
                    [newId]: [{ id: 'c_' + Date.now(), title: "Prendre un café en terrasse ☕", description: "Partage ton meilleur spot !", status: "active" }]
                });
                setSubmissions({
                    ...submissions,
                    [newId]: []
                });
                setCurrentGroup(newId);
                setShowCreateModal(false);
                alert(`Groupe "${newGroupName}" créé avec succès ! Partage le nom et le MDP à tes potes.`);
            };

            // --- PROPOSER / CHANGER DE DÉFI ---
            const handleAddChallenge = (e) => {
                e.preventDefault();
                if (!newChallengeTitle) return;

                const newC = {
                    id: 'c_' + Date.now(),
                    title: newChallengeTitle,
                    description: newChallengeDesc,
                    status: "active"
                };

                // Désactiver l'ancien défi actif du groupe
                const activeGroupChallenges = challenges[currentGroup] || [];
                const updatedChallenges = activeGroupChallenges.map(c => ({ ...c, status: "past" }));

                setChallenges({
                    ...challenges,
                    [currentGroup]: [newC, ...updatedChallenges]
                });
                setShowAddChallengeModal(false);
                setNewChallengeTitle("");
                setNewChallengeDesc("");
            };

            // --- SOUMETTRE LA VALIDATION DU DÉFI ---
            const handlePhotoUpload = (e) => {
                const file = e.target.files[0];
                if (!file || !currentUser) return;

                const activeChallenge = (challenges[currentGroup] || []).find(c => c.status === "active");
                if (!activeChallenge) {
                    alert("Aucun défi actif à valider !");
                    return;
                }

                // Pour tester en local, on convertit la photo en Base64
                const reader = new FileReader();
                reader.onloadend = () => {
                    const newSub = {
                        id: 'sub_' + Date.now(),
                        challengeId: activeChallenge.id,
                        userId: currentUser.id,
                        userName: currentUser.name,
                        userCity: currentUser.city,
                        userTimezone: currentUser.timezone,
                        photo: reader.result,
                        likes: 0,
                        likedBy: [] // Pour limiter à 1 Super Like par personne
                    };

                    const groupSubs = submissions[currentGroup] || [];
                    // Vérifie si déjà soumis
                    if (groupSubs.some(s => s.userId === currentUser.id && s.challengeId === activeChallenge.id)) {
                        alert("Tu as déjà relevé le défi cette semaine !");
                        return;
                    }

                    setSubmissions({
                        ...submissions,
                        [currentGroup]: [newSub, ...groupSubs]
                    });

                    // On donne +50 points direct pour avoir fait le défi
                    const groupMems = members[currentGroup] || [];
                    const updatedMems = groupMems.map(m => {
                        if (m.id === currentUser.id) {
                            return { ...m, points: m.points + 50 };
                        }
                        return m;
                    });
                    setMembers({ ...members, [currentGroup]: updatedMems });
                    alert("Félicitations ! Défi relevé. +50 Points ! 🎉");
                };
                reader.readAsDataURL(file);
            };

            // --- METTRE UN SUPER-LIKE ---
            const handleSuperLike = (subId) => {
                if (!currentUser) return;
                
                const groupSubs = submissions[currentGroup] || [];
                const submission = groupSubs.find(s => s.id === subId);
                const activeChallenge = (challenges[currentGroup] || []).find(c => c.status === "active");

                if (!submission || !activeChallenge) return;

                // Bloquer si c'est sa propre photo
                if (submission.userId === currentUser.id) {
                    alert("Tu ne peux pas t'auto-attribuer ton Super Like ! 😉");
                    return;
                }

                // Vérifier si l'utilisateur a déjà mis un super like pour CE défi précis
                const alreadyLiked = groupSubs.some(s => s.likedBy && s.likedBy.includes(currentUser.id));
                if (alreadyLiked) {
                    alert("Tu as déjà attribué ton unique Super Like pour ce défi !");
                    return;
                }

                // Ajouter le Super Like
                const updatedSubs = groupSubs.map(s => {
                    if (s.id === subId) {
                        return {
                            ...s,
                            likes: s.likes + 1,
                            likedBy: [...(s.likedBy || []), currentUser.id]
                        };
                    }
                    return s;
                });

                setSubmissions({
                    ...submissions,
                    [currentGroup]: updatedSubs
                });

                // Le créateur de la photo gagne +15 points bonus !
                const groupMems = members[currentGroup] || [];
                const updatedMems = groupMems.map(m => {
                    if (m.id === submission.userId) {
                        return { ...m, points: m.points + 15 };
                    }
                    return m;
                });
                setMembers({ ...members, [currentGroup]: updatedMems });
                alert("Super Like envoyé ! Ton pote gagne +15 Points bonus 🚀");
            };

            // Données calculées
            const activeGroupObj = groups.find(g => g.id === currentGroup) || groups[0];
            const activeChallenge = (challenges[currentGroup] || []).find(c => c.status === "active");
            const activeGroupMembers = members[currentGroup] || [];
            const activeGroupSubmissions = submissions[currentGroup] || [];

            // --- DESIGN DE LA PAGE D'INSCRIPTION SI NOUVEL UTILISATEUR ---
            if (!currentUser) {
                return (
                    <div class="p-6 flex flex-col justify-center items-center min-h-[500px] flex-grow bg-white">
                        <div class="text-center mb-8">
                            <span class="text-5xl">🔥</span>
                            <h1 class="text-3xl font-bold text-gray-800 mt-2">SquadApp</h1>
                            <p class="text-sm text-gray-500 mt-1">Sors de ta zone de confort avec ton groupe d'amis</p>
                        </div>

                        <form onSubmit={handleRegister} class="w-full space-y-4">
                            <h2 class="text-lg font-bold text-gray-700">Créer ton profil de joueur</h2>
                            
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Ton Prénom</label>
                                <input 
                                    type="text" 
                                    value={regUserName} 
                                    onChange={e => setRegUserName(e.target.value)} 
                                    placeholder="Ex: Alexandre" 
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-300 transition"
                                    required 
                                />
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Ta Ville Actuelle</label>
                                <input 
                                    type="text" 
                                    value={regCity} 
                                    onChange={e => setRegCity(e.target.value)} 
                                    placeholder="Ex: Tokyo, Paris, Montréal" 
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-300 transition"
                                    required 
                                />
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Créneau Horaire Détecté</label>
                                <select 
                                    value={regTimezone} 
                                    onChange={e => setRegTimezone(e.target.value)} 
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-300 transition text-sm text-gray-600 bg-gray-50 cursor-pointer"
                                >
                                    <option value="Europe/Paris">Europe / Paris (France)</option>
                                    <option value="Asia/Tokyo">Asie / Tokyo (Japon)</option>
                                    <option value="America/Montreal">Amérique / Montréal (Canada)</option>
                                    <option value="America/New_York">Amérique / New York (USA)</option>
                                    <option value="Europe/London">Europe / Londres (UK)</option>
                                    <option value="Australia/Sydney">Australie / Sydney</option>
                                </select>
                            </div>

                            <button type="submit" class="w-full py-3 bg-gradient-to-r from-pink-500 to-yellow-500 text-white rounded-xl font-bold shadow-lg hover:opacity-90 transition transform hover:-translate-y-0.5">
                                Commencer l'aventure 🚀
                            </button>
                        </form>
                    </div>
                );
            }

            return (
                <div class="flex flex-col h-full flex-grow bg-slate-50 relative">
                    
                    {/* --- HEADER --- */}
                    <header class="bg-white px-4 py-3 shadow-sm border-b border-gray-100 flex items-center justify-between sticky top-0 z-10">
                        <div class="flex items-center space-x-2">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-pink-500 to-yellow-400 flex items-center justify-center text-white font-bold brand-font shadow">
                                SQ
                            </div>
                            <div>
                                <h1 class="text-lg font-bold text-gray-800 leading-none">SquadApp</h1>
                                <span class="text-xs text-gray-500">Heure Locale : {getLocalTime(currentUser.timezone)}</span>
                            </div>
                        </div>

                        {/* Sélecteur de Groupe */}
                        <div class="flex items-center space-x-1">
                            <select 
                                value={currentGroup} 
                                onChange={e => setCurrentGroup(e.target.value)} 
                                class="bg-gray-100 text-gray-800 text-xs font-bold rounded-lg px-2.5 py-1.5 focus:outline-none border-none cursor-pointer hover:bg-gray-200 transition"
                            >
                                {groups.map(g => (
                                    <option key={g.id} value={g.id}>{g.name}</option>
                                ))}
                            </select>
                            <button 
                                onClick={() => setShowJoinModal(true)} 
                                title="Rejoindre un groupe" 
                                class="w-8 h-8 rounded-lg bg-pink-50 text-pink-500 hover:bg-pink-100 flex items-center justify-center text-sm transition"
                            >
                                <i class="fa-solid fa-plus-minus"></i>
                            </button>
                        </div>
                    </header>

                    {/* --- VILLE ET HEURE DES MEMBRES ACTIFS EN BANDEAU --- */}
                    <div class="bg-gradient-to-r from-slate-900 to-slate-800 text-white px-3 py-2 text-xs flex space-x-3 overflow-x-auto no-scrollbar shadow-inner">
                        {activeGroupMembers.map(m => (
                            <div key={m.id} class="flex items-center space-x-1.5 bg-slate-700 bg-opacity-50 px-2 py-1 rounded-full whitespace-nowrap">
                                <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
                                <span class="font-medium">{m.name}</span>
                                <span class="text-slate-300">({m.city})</span>
                                <span class="font-bold text-yellow-300">{getLocalTime(m.timezone).substring(0, 5)}</span>
                            </div>
                        ))}
                    </div>

                    {/* --- CONTENU DE L'ONGLET SÉLECTIONNÉ --- */}
                    <main class="flex-grow p-4 overflow-y-auto max-h-[640px] no-scrollbar pb-24">
                        
                        {/* --- ONGLET FEED (DÉFI ACTIF + VALIDATIONS) --- */}
                        {activeTab === "feed" && (
                            <div class="space-y-4">
                                
                                {/* Carte du défi actif */}
                                {activeChallenge ? (
                                    <div class="bg-gradient-to-tr from-pink-500 via-purple-500 to-indigo-600 rounded-2xl p-5 text-white shadow-xl relative overflow-hidden">
                                        <div class="absolute right-[-20px] top-[-20px] w-32 h-32 bg-white opacity-10 rounded-full"></div>
                                        <div class="flex justify-between items-start">
                                            <span class="bg-white bg-opacity-25 text-xs font-bold px-2.5 py-1 rounded-full uppercase tracking-wider">
                                                Défi de la semaine 🔥
                                            </span>
                                            <button 
                                                onClick={() => setShowAddChallengeModal(true)}
                                                class="text-xs bg-white text-purple-600 font-bold px-2 py-1 rounded-lg hover:bg-opacity-90 transition"
                                            >
                                                Nouveau Défi
                                            </button>
                                        </div>
                                        <h3 class="text-2xl font-bold mt-3 leading-snug">{activeChallenge.title}</h3>
                                        <p class="text-sm text-purple-100 mt-1">{activeChallenge.description}</p>
                                        
                                        {/* Bouton d'upload de validation */}
                                        <div class="mt-4 pt-4 border-t border-white border-opacity-20 flex justify-between items-center">
                                            <span class="text-xs text-purple-100">Rapporte +50 pts (+15 pts par Super Like !)</span>
                                            <label class="bg-yellow-400 hover:bg-yellow-300 text-slate-900 font-bold text-xs px-4 py-2 rounded-xl shadow cursor-pointer transition transform active:scale-95 flex items-center space-x-1">
                                                <i class="fa-solid fa-camera"></i>
                                                <span>Valider le défi</span>
                                                <input type="file" accept="image/*" onChange={handlePhotoUpload} class="hidden" />
                                            </label>
                                        </div>
                                    </div>
                                ) : (
                                    <div class="bg-white rounded-2xl p-6 text-center border-2 border-dashed border-gray-200">
                                        <p class="text-gray-500">Aucun défi actif pour le moment.</p>
                                        <button 
                                            onClick={() => setShowAddChallengeModal(true)}
                                            class="mt-3 bg-pink-500 text-white font-bold text-xs px-4 py-2 rounded-xl"
                                        >
                                            Proposer le premier défi
                                        </button>
                                    </div>
                                )}

                                {/* Fil d'actualité des photos validées */}
                                <div class="space-y-4">
                                    <h3 class="text-sm font-bold text-gray-500 uppercase tracking-wider mt-6">Preuves de la tribu</h3>
                                    
                                    {activeGroupSubmissions.length === 0 ? (
                                        <div class="text-center py-8 text-gray-400">
                                            <i class="fa-solid fa-images text-3xl mb-2 text-gray-300"></i>
                                            <p class="text-xs">Personne n'a encore validé le défi. Sois le premier !</p>
                                        </div>
                                    ) : (
                                        activeGroupSubmissions.map(sub => (
                                            <div key={sub.id} class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                                                {/* Header post */}
                                                <div class="px-4 py-3 flex justify-between items-center">
                                                    <div>
                                                        <span class="font-bold text-gray-800 text-sm">{sub.userName}</span>
                                                        <span class="text-xs text-gray-400 ml-1.5">depuis {sub.userCity}</span>
                                                    </div>
                                                    <span class="text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full font-bold">
                                                        {getLocalTime(sub.userTimezone).substring(0, 5)} local
                                                    </span>
                                                </div>
                                                
                                                {/* Photo */}
                                                <div class="aspect-square bg-slate-100 overflow-hidden relative">
                                                    <img src={sub.photo} alt="Preuve défi" class="w-full h-full object-cover" />
                                                </div>

                                                {/* Barre d'action et Super Like */}
                                                <div class="px-4 py-3 bg-slate-50 flex justify-between items-center">
                                                    <div class="flex items-center space-x-1">
                                                        <span class="text-pink-500 text-lg">❤️</span>
                                                        <span class="text-xs font-bold text-gray-600">{sub.likes} Super-Like{sub.likes > 1 ? 's' : ''}</span>
                                                    </div>
                                                    <button 
                                                        onClick={() => handleSuperLike(sub.id)}
                                                        class="bg-pink-500 hover:bg-pink-600 text-white text-xs font-bold px-3 py-1.5 rounded-xl shadow-sm transition transform active:scale-95 flex items-center space-x-1"
                                                    >
                                                        <i class="fa-solid fa-star text-yellow-300"></i>
                                                        <span>Super Like !</span>
                                                    </button>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                        {/* --- LEADERBOARD --- */}
                        {activeTab === "leaderboard" && (
                            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                                <div class="text-center mb-6">
                                    <span class="text-4xl">🏆</span>
                                    <h2 class="text-xl font-bold text-gray-800 mt-2">Le Tableau d'Honneur</h2>
                                    <p class="text-xs text-gray-400">Qui est le roi de la zone de confort ?</p>
                                </div>

                                <div class="divide-y divide-gray-100">
                                    {activeGroupMembers.sort((a,b) => b.points - a.points).map((mem, index) => (
                                        <div key={mem.id} class="py-3.5 flex items-center justify-between">
                                            <div class="flex items-center space-x-3">
                                                <span class={`w-6 h-6 rounded-full flex items-center justify-center font-bold text-xs ${
                                                    index === 0 ? 'bg-yellow-400 text-yellow-950' :
                                                    index === 1 ? 'bg-slate-300 text-slate-800' :
                                                    index === 2 ? 'bg-amber-600 text-white' : 'bg-gray-100 text-gray-500'
                                                }`}>
                                                    {index + 1}
                                                </span>
                                                <div>
                                                    <p class="font-bold text-gray-800 text-sm">{mem.name}</p>
                                                    <span class="text-[10px] text-gray-400 uppercase tracking-wider">{mem.city}</span>
                                                </div>
                                            </div>
                                            <div class="text-right">
                                                <span class="font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-yellow-500">
                                                    {mem.points} pts
                                                </span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* --- PARAMÈTRES / LIENS DE PARTAGE --- */}
                        {activeTab === "settings" && (
                            <div class="space-y-4">
                                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                                    <h2 class="text-md font-bold text-gray-800 mb-2">Partager ce groupe</h2>
                                    <p class="text-xs text-gray-500 mb-4">Invite tes potes à rejoindre la tribu rapidement !</p>
                                    
                                    <div class="bg-slate-50 p-3 rounded-xl border border-gray-150 flex justify-between items-center mb-4">
                                        <span class="text-xs font-mono text-gray-600 overflow-hidden text-ellipsis whitespace-nowrap mr-2">
                                            {window.location.origin}/join?g={activeGroupObj.id}
                                        </span>
                                        <button 
                                            onClick={() => {
                                                navigator.clipboard.writeText(`${window.location.origin}/join?g=${activeGroupObj.id}`);
                                                alert("Lien d'invitation copié !");
                                            }}
                                            class="bg-pink-100 text-pink-500 font-bold text-xs px-3 py-1.5 rounded-lg whitespace-nowrap"
                                        >
                                            Copier le lien
                                        </button>
                                    </div>

                                    <div class="border-t border-gray-100 pt-4 space-y-2">
                                        <p class="text-xs text-gray-400">Données de connexion d'accès :</p>
                                        <div class="flex justify-between text-xs">
                                            <span class="text-gray-500">Identifiant :</span>
                                            <span class="font-bold text-gray-800">{activeGroupObj.id}</span>
                                        </div>
                                        <div class="flex justify-between text-xs">
                                            <span class="text-gray-500">Mot de passe :</span>
                                            <span class="font-bold text-gray-800">{activeGroupObj.password}</span>
                                        </div>
                                    </div>
                                </div>

                                <button 
                                    onClick={() => {
                                        localStorage.clear();
                                        window.location.reload();
                                    }}
                                    class="w-full py-3 bg-red-50 text-red-500 rounded-xl font-bold text-xs hover:bg-red-100 transition"
                                >
                                    Effacer les données de test (Reset)
                                </button>
                            </div>
                        )}
                    </main>

                    {/* --- NAVIGATION DU BAS --- */}
                    <nav class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-2 flex justify-between items-center z-10 shadow-lg">
                        <button 
                            onClick={() => setActiveTab("feed")} 
                            class={`flex flex-col items-center space-y-1 ${activeTab === 'feed' ? 'text-pink-500' : 'text-gray-400'}`}
                        >
                            <i class="fa-solid fa-fire text-lg"></i>
                            <span class="text-[10px] font-bold">Défis</span>
                        </button>
                        
                        <button 
                            onClick={() => setActiveTab("leaderboard")} 
                            class={`flex flex-col items-center space-y-1 ${activeTab === 'leaderboard' ? 'text-pink-500' : 'text-gray-400'}`}
                        >
                            <i class="fa-solid fa-trophy text-lg"></i>
                            <span class="text-[10px] font-bold">Classement</span>
                        </button>

                        <button 
                            onClick={() => setShowCreateModal(true)} 
                            class="w-12 h-12 rounded-full bg-gradient-to-tr from-pink-500 to-yellow-500 text-white flex items-center justify-center shadow-lg -translate-y-4 hover:opacity-90 transform active:scale-95 transition"
                        >
                            <i class="fa-solid fa-users text-lg"></i>
                        </button>

                        <button 
                            onClick={() => setActiveTab("settings")} 
                            class={`flex flex-col items-center space-y-1 ${activeTab === 'settings' ? 'text-pink-500' : 'text-gray-400'}`}
                        >
                            <i class="fa-solid fa-share-nodes text-lg"></i>
                            <span class="text-[10px] font-bold">Partager</span>
                        </button>
                    </nav>

                    {/* --- MODAL REJOINDRE UN GROUPE --- */}
                    {showJoinModal && (
                        <div class="absolute inset-0 bg-slate-950 bg-opacity-60 flex items-center justify-center z-50 p-4">
                            <div class="bg-white rounded-2xl p-6 w-full max-w-sm space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="font-bold text-gray-800 text-lg">Rejoindre un groupe</h3>
                                    <button onClick={() => setShowJoinModal(false)} class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleJoinGroup} class="space-y-3">
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">ID du groupe</label>
                                        <input type="text" value={joinName} onChange={e => setJoinName(e.target.value)} placeholder="Nom ou ID unique" class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                    </div>
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Mot de passe d'accès</label>
                                        <input type="password" value={joinPassword} onChange={e => setJoinPassword(e.target.value)} class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                    </div>
                                    <button type="submit" class="w-full py-2.5 bg-pink-500 text-white font-bold text-sm rounded-xl">Accéder au groupe</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* --- MODAL CRÉER UN GROUPE --- */}
                    {showCreateModal && (
                        <div class="absolute inset-0 bg-slate-950 bg-opacity-60 flex items-center justify-center z-50 p-4">
                            <div class="bg-white rounded-2xl p-6 w-full max-w-sm space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="font-bold text-gray-800 text-lg">Créer un nouveau groupe d'amis</h3>
                                    <button onClick={() => setShowCreateModal(false)} class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleCreateGroup} class="space-y-3">
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Nom du groupe</label>
                                        <input type="text" value={newGroupName} onChange={e => setNewGroupName(e.target.value)} placeholder="Ex: Les Évadés" class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                    </div>
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Mot de passe du groupe</label>
                                        <input type="password" value={newGroupPass} onChange={e => setNewGroupPass(e.target.value)} placeholder="Pour sécuriser l'accès" class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                    </div>
                                    <button type="submit" class="w-full py-2.5 bg-gradient-to-r from-pink-500 to-yellow-500 text-white font-bold text-sm rounded-xl">Lancer le groupe</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* --- MODAL PROPOSER UN NOUVEAU DÉFI --- */}
                    {showAddChallengeModal && (
                        <div class="absolute inset-0 bg-slate-950 bg-opacity-60 flex items-center justify-center z-50 p-4">
                            <div class="bg-white rounded-2xl p-6 w-full max-w-sm space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="font-bold text-gray-800 text-lg">Proposer le défi de la semaine</h3>
                                    <button onClick={() => setShowAddChallengeModal(false)} class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleAddChallenge} class="space-y-3">
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Intitulé du défi</label>
                                        <input type="text" value={newChallengeTitle} onChange={e => setNewChallengeTitle(e.target.value)} placeholder="Ex: Faire une photo avec un animal insolite" class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                    </div>
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Consignes (Optionnel)</label>
                                        <textarea value={newChallengeDesc} onChange={e => setNewChallengeDesc(e.target.value)} placeholder="Précise les règles..." class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm h-20" />
                                    </div>
                                    <button type="submit" class="w-full py-2.5 bg-pink-500 text-white font-bold text-sm rounded-xl">Changer le défi actif 🚀</button>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
