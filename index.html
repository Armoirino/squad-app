                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Pseudo</label>
                                        <input type="text" value={editName} onChange={e => setEditName(e.target.value)} class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                    </div>
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Ville</label>
                                        <input type="text" value={editCity} onChange={e => setEditCity(e.target.value)} class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                    </div>
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Fuseau horaire</label>
                                        <select value={editTimezone} onChange={e => setEditTimezone(e.target.value)} class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required>
                                            {timezoneOptions.map(tz => (<option key={tz} value={tz}>{getTimezoneLabel(tz)}</option>))}
                                        </select>
                                    </div>
                                    <button type="submit" class="w-full py-2.5 bg-pink-500 text-white font-bold text-sm rounded-xl">Enregistrer les changements</button>
                                    <button type="button" onClick={() => { localStorage.removeItem('squad_current_user'); localStorage.removeItem('squad_active_group_id'); window.location.reload(); }} class="w-full py-2.5 bg-red-50 text-red-500 font-bold text-sm rounded-xl border border-red-100 hover:bg-red-100 transition">
                                        Se déconnecter
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {showAddChallengeModal && (
                        <div class="absolute inset-0 bg-slate-950 bg-opacity-60 flex items-center justify-center z-50 p-4">
                            <div class="bg-white rounded-2xl p-6 w-full max-w-sm space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="font-bold text-gray-800 text-lg">Nouveau défi hebdomadaire</h3>
                                    <button onClick={() => setShowAddChallengeModal(false)} class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleAddChallenge} class="space-y-3">
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Intitulé du défi</label>
                                        <input type="text" value={newChallengeTitle} onChange={e => setNewChallengeTitle(e.target.value)} placeholder="Ex: Commander une boisson dans une autre langue" class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm" required />
                                    </div>
                                    <div>
                                        <label class="block text-xs text-gray-400 mb-1">Précisions (Optionnel)</label>
                                        <textarea value={newChallengeDesc} onChange={e => setNewChallengeDesc(e.target.value)} placeholder="Explique comment valider..." class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 outline-none text-sm h-20" />
                                    </div>
                                    <button type="submit" class="w-full py-2.5 bg-pink-500 text-white font-bold text-sm rounded-xl">Lancer le Défi !</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* --- MODALE CONFIRMATION QUITTER GROUPE --- */}
                    {showConfirmLeave && (
                        <div class="absolute inset-0 bg-slate-950 bg-opacity-60 flex items-center justify-center z-50 p-6">
                            <div class="bg-white rounded-2xl p-6 w-full max-w-sm space-y-4 shadow-2xl">
                                <div class="text-center">
                                    <div class="w-14 h-14 rounded-full bg-red-50 flex items-center justify-center mx-auto mb-3">
                                        <i class="fa-solid fa-door-open text-red-400 text-2xl"></i>
                                    </div>
                                    <h3 class="font-bold text-gray-800 text-lg">Quitter le groupe ?</h3>
                                    <p class="text-sm text-gray-500 mt-2">
                                        Tu vas perdre ta place dans <span class="font-bold text-gray-700">{(groups.find(g => g.id === currentGroup) || {}).name || "ce groupe"}</span>. Tes points accumulés seront perdus et tu devras rejoindre à nouveau pour y accéder.
                                    </p>
                                </div>
                                <div class="flex gap-3">
                                    <button
                                        onClick={() => setShowConfirmLeave(false)}
                                        class="flex-1 py-3 bg-slate-100 text-slate-700 rounded-xl font-bold text-sm hover:bg-slate-200 transition"
                                    >
                                        Annuler
                                    </button>
                                    <button
                                        onClick={async () => { setShowConfirmLeave(false); await handleLeaveGroup(); }}
                                        class="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold text-sm hover:bg-red-600 transition"
                                    >
                                        Quitter quand même
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- LIGHTBOX --- */}
                    {lightboxSrc && (
                        <div 
                            class="absolute inset-0 bg-black bg-opacity-90 flex flex-col items-center justify-center z-[100] lightbox-overlay"
                            onClick={() => setLightboxSrc(null)}
                        >
                            <div class="absolute top-4 right-4 z-10">
                                <button 
                                    onClick={() => setLightboxSrc(null)}
                                    class="w-10 h-10 bg-white bg-opacity-20 hover:bg-opacity-30 rounded-full flex items-center justify-center text-white text-lg transition"
                                >
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                            </div>
                            {lightboxName && (
                                <p class="absolute top-5 left-4 text-white text-sm font-bold bg-black bg-opacity-40 px-3 py-1 rounded-full">{lightboxName}</p>
                            )}
                            <img 
                                src={lightboxSrc} 
                                alt="Photo agrandie"
                                class="max-w-full max-h-full object-contain lightbox-img rounded-xl shadow-2xl"
                                onClick={e => e.stopPropagation()}
                            />
                            <p class="text-white text-xs mt-3 opacity-50">Appuie n'importe où pour fermer</p>
                        </div>
                    )}

                    {/* --- TOAST NOTIFICATIONS --- */}
                    <div class="absolute bottom-20 left-0 right-0 flex flex-col items-center gap-2 z-[90] px-4 pointer-events-none">
                        {toasts.map(t => (
                            <div key={t.id} className={`toast ${t.hiding ? 'hide' : ''} pointer-events-auto max-w-xs w-full px-4 py-3 rounded-2xl shadow-xl flex items-center gap-3 text-sm font-semibold ${
                                t.type === 'error' ? 'bg-red-500 text-white' : 
                                t.type === 'info' ? 'bg-slate-700 text-white' : 
                                'bg-gradient-to-r from-pink-500 to-yellow-500 text-white'
                            }`}>
                                <span class="text-base">
                                    {t.type === 'error' ? '⚠️' : t.type === 'info' ? 'ℹ️' : '✅'}
                                </span>
                                <span>{t.msg}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
